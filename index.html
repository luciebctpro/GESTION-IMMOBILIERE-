Emprunts();\n  recalc();\n  saveData();\n}\n\nfunction renderEmprunts() {\n  const el = document.getElementById('emprunts-list');\n  if (!emprunts.length) {\n    el.innerHTML = '<div class=\"empty\" style=\"padding:32px\"><div class=\"empty-icon\">🏦<\u002Fdiv><p>Aucun emprunt enregistré.<\u002Fp><\u002Fdiv>';\n    return;\n  }\n  el.innerHTML = emprunts.map(e => `\n    <div class=\"emprunt-grid\">\n      <div class=\"emprunt-card\">\n        <div class=\"emprunt-card-head\">\n          <h4>🏦 ${e.nom || 'Emprunt'}<\u002Fh4>\n          <button class=\"btn-del\" onclick=\"removeEmprunt(${e.id})\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"emprunt-fields\">\n          <div class=\"ef full\"><label>Nom / Référence<\u002Flabel><input type=\"text\" value=\"${e.nom||''}\" placeholder=\"Ex: Crédit Vitry\" onchange=\"emprunts.find(x=>x.id===${e.id}).nom=this.value;renderEmprunts();recalc();saveData()\"><\u002Fdiv>\n          <div class=\"ef\"><label>Bien concerné<\u002Flabel>\n            <select onchange=\"emprunts.find(x=>x.id===${e.id}).bien=this.value;recalc();saveData()\">\n              <option value=\"\" ${!e.bien?'selected':''}>— Bien —<\u002Foption>\n              <option value=\"Vitry sur Seine\" ${e.bien==='Vitry sur Seine'?'selected':''}>Vitry sur Seine<\u002Foption>\n              <option value=\"Ferrières en Brie\" ${e.bien==='Ferrières en Brie'?'selected':''}>Ferrières en Brie<\u002Foption>\n              <option value=\"Les deux\" ${e.bien==='Les deux'?'selected':''}>Les deux<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div class=\"ef\"><label>Banque<\u002Flabel><input type=\"text\" value=\"${e.banque||''}\" placeholder=\"Nom banque\" onchange=\"emprunts.find(x=>x.id===${e.id}).banque=this.value;saveData()\"><\u002Fdiv>\n          <div class=\"ef\"><label>Capital initial (€)<\u002Flabel><input type=\"number\" value=\"${e.capital_initial||''}\" placeholder=\"0\" onchange=\"emprunts.find(x=>x.id===${e.id}).capital_initial=this.value;recalc();saveData()\"><\u002Fdiv>\n          <div class=\"ef\"><label>Taux annuel (%)<\u002Flabel><input type=\"number\" value=\"${e.taux||''}\" placeholder=\"0,00\" step=\"0.01\" onchange=\"emprunts.find(x=>x.id===${e.id}).taux=this.value;saveData()\"><\u002Fdiv>\n          <div class=\"ef\"><label>Durée (mois restants)<\u002Flabel><input type=\"number\" value=\"${e.duree||''}\" placeholder=\"0\" onchange=\"emprunts.find(x=>x.id===${e.id}).duree=this.value;recalc();saveData()\"><\u002Fdiv>\n          <div class=\"ef\"><label>Mensualité hors assurance (€)<\u002Flabel><input type=\"number\" value=\"${e.mensualite||''}\" placeholder=\"0,00\" step=\"0.01\" onchange=\"emprunts.find(x=>x.id===${e.id}).mensualite=this.value;recalc();saveData()\"><\u002Fdiv>\n          <div class=\"ef\"><label>Assurance mensuelle (€)<\u002Flabel><input type=\"number\" value=\"${e.assurance_mens||''}\" placeholder=\"0,00\" step=\"0.01\" onchange=\"emprunts.find(x=>x.id===${e.id}).assurance_mens=this.value;recalc();saveData()\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"emprunt-total\">\n          <span>Mensualité totale<\u002Fspan>\n          <span>${fmt((parseFloat(e.mensualite)||0)+(parseFloat(e.assurance_mens)||0))}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\nfunction addEmpRow(mois='', bien='', banque='', capital='', interets='', assurance='') {\n  const tb = document.getElementById('emp-ech-tb');\n  const tr = document.createElement('tr');\n  tr.dataset.pj = '[]';\n  const total = (parseFloat(capital)||0) + (parseFloat(interets)||0) + (parseFloat(assurance)||0);\n  tr.innerHTML = `\n    <td><input type=\"month\" value=\"${mois}\" style=\"width:120px\" onchange=\"updateEmpRow(this)\"><\u002Ftd>\n    <td><select onchange=\"recalc()\"><option value=\"\">— Bien —<\u002Foption><option value=\"Vitry\"${bien==='Vitry'?' selected':''}>Vitry<\u002Foption><option value=\"Ferrières\"${bien==='Ferrières'?' selected':''}>Ferrières<\u002Foption><\u002Fselect><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Banque\" value=\"${banque}\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${capital}\" style=\"text-align:right;width:90px;color:var(--blue)\" onchange=\"updateEmpRow(this)\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${interets}\" style=\"text-align:right;width:90px;color:var(--red)\" onchange=\"updateEmpRow(this)\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${assurance}\" style=\"text-align:right;width:90px;color:var(--gold)\" onchange=\"updateEmpRow(this)\"><\u002Ftd>\n    <td class=\"mono\" style=\"font-weight:700\">${total > 0 ? fmt(total) : '—'}<\u002Ftd>\n    <td><div class=\"pj-cell\"><label class=\"pj-btn\">📎 <input type=\"file\" accept=\"image/*,.pdf\" multiple style=\"display:none\" onchange=\"addPJFiles(this)\"> Joindre<\u002Flabel><\u002Fdiv><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n}\n\nfunction updateEmpRow(inp) {\n  const tr = inp.closest('tr');\n  const nums = tr.querySelectorAll('input[type=\"number\"]');\n  const total = Array.from(nums).reduce((s,i)=>s+(parseFloat(i.value)||0),0);\n  tr.cells[6].textContent = total > 0 ? fmt(total) : '—';\n  recalc();\n}\n\n// ══ ANALYSE EN LANGAGE SIMPLE ══\nfunction renderAnalyse(totRec, totDep, totCF, vRec, fRec, vDep, fDep, gDep, empInt, empAss, empCap) {\n  const grid = document.getElementById('analyse-grid');\n  const conseil = document.getElementById('analyse-conseil');\n  if (totRec === 0 && totDep === 0) {\n    grid.innerHTML = '<div class=\"analyse-bloc\"><div class=\"ab-icon\">📭<\u002Fdiv><div class=\"ab-title\">Situation<\u002Fdiv><div class=\"ab-text\">Aucune donnée saisie pour le moment. Commencez à renseigner vos loyers et dépenses.<\u002Fdiv><\u002Fdiv>';\n    conseil.style.display = 'none';\n    return;\n  }\n\n  const blocs = [];\n\n  // Bloc revenus\n  if (totRec > 0) {\n    blocs.push(`<div class=\"analyse-bloc ok\"><div class=\"ab-icon\">💰<\u002Fdiv><div class=\"ab-title\">Vos revenus<\u002Fdiv><div class=\"ab-text\">Vous avez encaissé <strong>${fmt(totRec)}<\u002Fstrong> au total${vRec > 0 ? ` dont <strong>${fmt(vRec)}<\u002Fstrong> de loyers à Vitry` : ''}${fRec > 0 ? ` et <strong>${fmt(fRec)}<\u002Fstrong> via Airbnb à Ferrières` : ''}.<\u002Fdiv><\u002Fdiv>`);\n  }\n\n  // Bloc dépenses\n  if (totDep > 0) {\n    blocs.push(`<div class=\"analyse-bloc ${totDep > totRec ? 'bad' : 'warn'}\"><div class=\"ab-icon\">🧾<\u002Fdiv><div class=\"ab-title\">Vos dépenses<\u002Fdiv><div class=\"ab-text\">Vous avez dépensé <strong>${fmt(totDep)}<\u002Fstrong> au total en charges et frais divers${empCap > 0 ? `, dont <strong>${fmt(empCap)}<\u002Fstrong> de remboursement de capital d'emprunt` : ''}.<\u002Fdiv><\u002Fdiv>`);\n  }\n\n  // Bloc cash flow\n  const cfClass = totCF > 0 ? 'ok' : totCF === 0 ? '' : 'bad';\n  const cfEmoji = totCF > 0 ? '✅' : totCF === 0 ? '⚖️' : '⚠️';\n  let cfText = '';\n  if (totRec === 0) {\n    cfText = 'Aucune recette enregistrée.';\n  } else if (totCF > 0) {\n    cfText = `Après avoir payé toutes vos charges, il vous reste <strong>${fmt(totCF)}<\u002Fstrong>. C'est ce qu'on appelle votre <em>cash flow positif<\u002Fem> — votre immobilier vous rapporte de l'argent.`;\n  } else if (totCF === 0) {\n    cfText = `Vos revenus couvrent exactement vos dépenses. Vous êtes à l'équilibre mais sans marge de sécurité.`;\n  } else {\n    cfText = `Vos dépenses dépassent vos revenus de <strong>${fmt(Math.abs(totCF))}<\u002Fstrong>. Chaque mois, vous <em>dépensez plus que vous ne gagnez<\u002Fem> avec votre immobilier. Il faut y remédier.`;\n  }\n  blocs.push(`<div class=\"analyse-bloc ${cfClass}\"><div class=\"ab-icon\">${cfEmoji}<\u002Fdiv><div class=\"ab-title\">Ce qu'il vous reste<\u002Fdiv><div class=\"ab-text\">${cfText}<\u002Fdiv><\u002Fdiv>`);\n\n  // Bloc emprunts\n  if (empInt > 0 || empAss > 0) {\n    blocs.push(`<div class=\"analyse-bloc warn\"><div class=\"ab-icon\">🏦<\u002Fdiv><div class=\"ab-title\">Vos emprunts<\u002Fdiv><div class=\"ab-text\">Vous payez <strong>${fmt(empInt)}<\u002Fstrong> d'intérêts et <strong>${fmt(empAss)}<\u002Fstrong> d'assurance emprunteur. <em>Bonne nouvelle :<\u002Fem> ces deux montants sont déductibles de vos impôts — votre comptable s'en occupera.<\u002Fdiv><\u002Fdiv>`);\n  }\n\n  // Bloc rendement\n  if (totRec > 0) {\n    const rdt = (totCF / totRec * 100).toFixed(1);\n    const rdtClass = parseFloat(rdt) > 10 ? 'ok' : parseFloat(rdt) > 0 ? 'warn' : 'bad';\n    blocs.push(`<div class=\"analyse-bloc ${rdtClass}\"><div class=\"ab-icon\">📊<\u002Fdiv><div class=\"ab-title\">Votre rendement<\u002Fdiv><div class=\"ab-text\">Sur 100 € encaissés, il vous en reste <strong>${rdt} €<\u002Fstrong> après toutes les charges. ${parseFloat(rdt) > 10 ? \"C'est un très bon rendement !\" : parseFloat(rdt) > 0 ? \"C'est correct, mais il y a peut-être des optimisations possibles.\" : \"C'est insuffisant — à analyser avec votre comptable.\"}<\u002Fdiv><\u002Fdiv>`);\n  }\n\n  grid.innerHTML = blocs.join('');\n\n  // Conseil personnalisé\n  let conseilText = '';\n  if (totCF < 0 && totRec > 0) {\n    conseilText = `<strong>⚠️ Point d'attention :<\u002Fstrong> Vos dépenses sont supérieures à vos revenus. Vérifiez si certaines charges peuvent être réduites, ou si les loyers peuvent être revus à la hausse lors du prochain renouvellement de bail.`;\n  } else if (empInt > 0 && totRec > 0) {\n    const deductible = empInt + empAss;\n    conseilText = `<strong>💡 Bon à savoir :<\u002Fstrong> En régime BIC réel, vous pouvez déduire <strong>${fmt(deductible)}<\u002Fstrong> (intérêts + assurance emprunteur) de vos revenus locatifs, ce qui réduit votre impôt. Pensez à transmettre ces justificatifs à votre comptable.`;\n  } else if (totCF > 0 && totRec > 0) {\n    conseilText = `<strong>✅ Situation saine :<\u002Fstrong> Votre immobilier génère un excédent. Pensez à mettre de côté une partie pour faire face aux grosses réparations imprévues (toiture, chaudière, etc.).`;\n  }\n\n  if (conseilText) {\n    conseil.innerHTML = conseilText;\n    conseil.style.display = 'block';\n  } else {\n    conseil.style.display = 'none';\n  }\n}\n\n// ══ INIT ══\nrenderPC();\nloadData();\nrecalc();\n\n// ══ EXPOSER TOUTES LES FONCTIONS onclick SUR window ══\nwindow.addDepRow = addDepRow;\nwindow.addLoyRow = addLoyRow;\nwindow.addPrvRow = addPrvRow;\nwindow.addLocRow = addLocRow;\nwindow.addEchRow = addEchRow;\nwindow.addEmprunt = addEmprunt;\nwindow.removeEmprunt = removeEmprunt;\nwindow.batchProcess = batchProcess;\nwindow.openOCR = openOCR;\nwindow.closeOCR = closeOCR;\nwindow.confirmOCR = confirmOCR;\nwindow.handleOCRFile = handleOCRFile;\nwindow.importAirbnb = importAirbnb;\nwindow.importPC = importPC;\nwindow.saveData = saveData;\nwindow.clearAll = clearAll;\nwindow.genEcritures = genEcritures;\nwindow.exportFEC = exportFEC;\nwindow.exportCSV = exportCSV;\nwindow.renderPC = renderPC;\nwindow.calcAmort = calcAmort;\nwindow.calcAmortV = calcAmortV;\nwindow.calcAmortF = calcAmortF;\nwindow.toggleAmort = toggleAmort;\nwindow.setAmortView = setAmortView;\nwindow.updateEchTot = updateEchTot;\nwindow.addLoyRow = addLoyRow;\nwindow.closePJ = closePJ;\nwindow.addPJFiles = addPJFiles;\nwindow.addImmoRow = addImmoRow;\nwindow.calcImmoAmort = calcImmoAmort;\nwindow.applyReadonlyZones = applyReadonlyZones;\nwindow.promptZoneUnlock = promptZoneUnlock;\nwindow.unlockZone = unlockZone;\nwindow.addN1Row = addN1Row;\nwindow.importN1 = importN1;\nwindow.renderBalance = renderBalance;\n\n}); // fin DOMContentLoaded\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
