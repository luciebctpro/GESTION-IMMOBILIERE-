${fmt(cf)} (${((cf/rec)*100).toFixed(1)}% des recettes).`;}\n  else if(cf===0){b.classList.add('neutral');t.textContent='⚖️ À l\\'équilibre : recettes = dépenses.';}\n  else{b.classList.add('negative');t.textContent=`⚠️ Déficit de ${fmt(Math.abs(cf))} · Dépenses (${fmt(dep)}) > Recettes (${fmt(rec)}).`;}\n}\n\n// ══ AIRBNB DATA ══\nlet airbnbData = null;\n\nasync function importAirbnb(file) {\n  if(!file||file.type!=='application/pdf'){showAirStatus('err','❌ Sélectionnez un PDF Airbnb.');return;}\n  showAirStatus('loading','⏳ Lecture du rapport…');\n  try {\n    const ab=await file.arrayBuffer();\n    const pdf=await pdfjsLib.getDocument({data:ab}).promise;\n    let txt='';\n    for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();txt+=c.items.map(x=>x.str).join(' ')+'\\n';}\n    const d=parseAirbnb(txt);\n    if(!d){showAirStatus('err','❌ Format non reconnu. Utilisez le rapport Airbnb « Rapport de revenus ».');return;}\n    airbnbData=d;\n    renderAirbnb(d);\n    // Frais de service → dépense auto\n    const frais=Math.abs(d.totalFrais);\n    if(frais>0){\n      let deja=false;\n      document.querySelectorAll('#f-dep-tb tr').forEach(tr=>{if((tr.querySelector('input[type=\"text\"]')?.value||'').includes('Airbnb'))deja=true;});\n      if(!deja) addDepRow('f-dep-tb',`${d.annee}-12-31`,'Airbnb','HONORAIRES COMPTABLES',`Frais de service Airbnb ${d.annee}`,frais.toFixed(2));\n    }\n    saveData();\n    showAirStatus('ok',`✅ Importé · ${d.annee} · ${d.logements.length} logements · ${d.totalNuits} nuits · Net : ${fmt(d.totalNet)}`);\n    recalc();\n  } catch(e){console.error(e);showAirStatus('err','❌ Erreur de lecture PDF.');}\n}\n\nfunction showAirStatus(type,msg){const el=document.getElementById('air-status');el.style.display='flex';el.className='imp-status '+type;el.textContent=msg;}\n\nfunction parseNum(s){return parseFloat((s||'').replace(/\\s/g,'').replace(',','.').replace('€',''))||0;}\nfunction parseNum2(s){return parseFloat((s||'').replace(/\\s/g,'').replace(',','.').replace('€',''))||0;}\n\nfunction parseAirbnb(txt) {\n  try {\n    const anneeM=txt.match(/(\\d{4})\\s+Rapport de revenus/);\n    const annee=anneeM?anneeM[1]:new Date().getFullYear();\n    const recM=txt.match(/Revenus\\s+([\\d\\s]+,\\d{2})\\s*€\\s+([-\\d\\s]+,\\d{2})\\s*€\\s+([-\\d\\s]+,\\d{2})\\s*€\\s+([\\d\\s]+,\\d{2})\\s*€\\s+([\\d\\s]+,\\d{2})\\s*€/);\n    const totalBrut=recM?parseNum(recM[1]):0;\n    const totalFrais=recM?parseNum(recM[3]):0;\n    const totalNet=recM?parseNum(recM[5]):0;\n    const nuitsM=txt.match(/Nuits réservées\\s+([\\d\\s]+)/);\n    const totalNuits=nuitsM?parseInt(nuitsM[1].replace(/\\s/g,'')):0;\n    const logements=[];\n    const sec=txt.match(/Logement\\s+Revenus bruts[\\s\\S]+?(?=Taxes|Types de revenus)/);\n    if(sec){\n      const pat=/([A-Za-z\\u00C0-\\u024F#][^\\d€]{3,80?}?)\\s+([\\d\\s]+,\\d{2})\\s*€\\s+([-\\d\\s]+,\\d{2})\\s*€\\s+([-\\d\\s]+,\\d{2})\\s*€\\s+([\\d\\s]+,\\d{2})\\s*€\\s+([\\d\\s]+,\\d{2})\\s*€/g;\n      let m;\n      while((m=pat.exec(sec[0]))!==null){\n        const nom=m[1].trim();\n        if(nom&&!nom.includes('Logement')) logements.push({nom,brut:parseNum(m[2]),regul:parseNum(m[3]),frais:parseNum(m[4]),total:parseNum(m[6]),nuits:null});\n      }\n    }\n    const MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];\n    const mensuels=[];\n    MOIS.forEach(mois=>{\n      const r=new RegExp(mois+'\\\\s+([\\\\d\\\\s]+,\\\\d{2})\\\\s*€\\\\s+([\\\\d\\\\s]+,\\\\d{2})\\\\s*€');\n      const m=txt.match(r);\n      if(m) mensuels.push({mois:mois.charAt(0).toUpperCase()+mois.slice(1),brut:parseNum(m[1]),net:parseNum(m[2])});\n    });\n    return{annee,totalBrut,totalFrais,totalNet,totalNuits,logements,mensuels};\n  } catch(e){console.error(e);return null;}\n}\n\nfunction renderAirbnb(d) {\n  document.getElementById('f-rec').textContent=fmtS(d.totalNet);\n  document.getElementById('f-brut').textContent=fmtS(d.totalBrut);\n  document.getElementById('f-nb').textContent=d.totalNuits;\n  document.getElementById('f-rec-tot').textContent=fmt(d.totalNet);\n  const tb=document.getElementById('f-log');\n  tb.innerHTML='';\n  d.logements.forEach(l=>{\n    const tr=document.createElement('tr');\n    tr.innerHTML=`<td style=\"font-weight:500\">${l.nom}<\u002Ftd><td class=\"mono\">${fmt(l.brut)}<\u002Ftd><td class=\"mono-red\">${l.regul!==0?fmt(l.regul):'—'}<\u002Ftd><td class=\"mono-red\">${fmt(l.frais)}<\u002Ftd><td class=\"mono-green\">${fmt(l.total)}<\u002Ftd><td class=\"mono-blue\">${l.nuits||'—'}<\u002Ftd>`;\n    tb.appendChild(tr);\n  });\n  const tot=document.createElement('tr');\n  tot.style.fontWeight='700';tot.style.borderTop='2px solid var(--border)';\n  tot.innerHTML=`<td>TOTAL<\u002Ftd><td class=\"mono\">${fmt(d.totalBrut)}<\u002Ftd><td><\u002Ftd><td class=\"mono-red\">${fmt(d.totalFrais)}<\u002Ftd><td class=\"mono-green\">${fmt(d.totalNet)}<\u002Ftd><td class=\"mono-blue\">${d.totalNuits}<\u002Ftd>`;\n  tb.appendChild(tot);\n  const tbM=document.getElementById('f-men');\n  tbM.innerHTML='';\n  d.mensuels.forEach(m=>{\n    const tr=document.createElement('tr');\n    tr.innerHTML=`<td style=\"font-weight:500\">${m.mois}<\u002Ftd><td class=\"mono\">${fmt(m.brut)}<\u002Ftd><td class=\"mono-green\">${fmt(m.net)}<\u002Ftd>`;\n    tbM.appendChild(tr);\n  });\n}\n\n// ══ RECALC ══\nlet ch1=null,ch2=null;\n\n// ══ SYNC AUTO EMPRUNT → DÉPENSES ══\n// Les intérêts et l'assurance emprunteur saisis dans la fiche/échéancier d'un bien\n// alimentent automatiquement la catégorie Dépenses de ce même bien (ligne verrouillée, non persistée).\nfunction upsertAutoDepRow(tableId, autoKey, fourn, cat, comment, amt) {\n  const tb = document.getElementById(tableId);\n  if (!tb) return;\n  let tr = tb.querySelector(`tr[data-auto=\"${autoKey}\"]`);\n  if (amt <= 0) { if (tr) tr.remove(); return; }\n  if (!tr) {\n    addDepRow(tableId, '', fourn, cat, comment, amt.toFixed(2));\n    tr = tb.lastElementChild;\n    tr.dataset.auto = autoKey;\n    tr.style.background = 'rgba(80,70,228,.04)';\n    const inputs = tr.querySelectorAll('input');\n    const fournInput = inputs[1];\n    if (fournInput) fournInput.title = 'Généré automatiquement depuis les données d\\'emprunt';\n    const amtInput = inputs[inputs.length - 1];\n    if (amtInput) { amtInput.readOnly = true; amtInput.style.background = 'var(--surface2)'; amtInput.style.cursor = 'not-allowed'; amtInput.title = 'Montant calculé automatiquement — modifiez-le depuis la fiche emprunt'; }\n    const del = tr.querySelector('.btn-del');\n    if (del) del.outerHTML = '<span title=\"Ligne automatique liée à l\\'emprunt · non supprimable ici\" style=\"color:var(--dim);font-size:11px\">🔒<\u002Fspan>';\n  } else {\n    const inputs = tr.querySelectorAll('input');\n    const amtInput = inputs[inputs.length - 1];\n    if (amtInput) amtInput.value = amt.toFixed(2);\n  }\n}\n\nfunction syncEmpDep(bien) {\n  const echId = `${bien}-ech-tb`, depId = `${bien}-dep-tb`;\n  const banqueId = `${bien}-emp-banque`, assId = `${bien}-emp-ass`;\n  const bienLbl = bien === 'v' ? 'Vitry sur Seine' : 'Ferrières en Brie';\n  const annee = new Date().getFullYear();\n\n  let intTotal = 0, assTotal = 0, rows = 0;\n  document.querySelectorAll(`#${echId} tr`).forEach(tr => {\n    const nums = tr.querySelectorAll('input[type=\"number\"]');\n    if (nums.length >= 3) {\n      intTotal += parseFloat(nums[1]?.value) || 0;\n      assTotal += parseFloat(nums[2]?.value) || 0;\n      rows++;\n    }\n  });\n  // Sans échéancier détaillé, on se rabat sur l'assurance mensuelle de la fiche emprunt (× 12)\n  if (rows === 0) {\n    const assMens = parseFloat(document.getElementById(assId)?.value) || 0;\n    assTotal = assMens * 12;\n  }\n  const banque = document.getElementById(banqueId)?.value || 'Banque';\n  upsertAutoDepRow(depId, 'emp-int', banque, '6615 - Intérêts des emprunts', `🔒 Auto · Intérêts emprunt ${annee} - ${bienLbl}`, intTotal);\n  upsertAutoDepRow(depId, 'emp-ass', banque, '6160 - Primes d assurance', `🔒 Auto · Assurance emprunteur ${annee} - ${bienLbl}`, assTotal);\n}\n\n// ══ ZONES EN LECTURE SEULE (Emprunt / Immobilisations) ══\n// Toujours visibles, jamais éditables sans le mot de passe comptable (même mot de passe que le module Comptabilité).\nfunction applyReadonlyZones() {\n  const unlocked = sessionStorage.getItem('compta_auth') === '1';\n  document.querySelectorAll('.readonly-zone').forEach(zone=>{\n    zone.querySelectorAll('input, select').forEach(el=>{ if(!el.classList.contains('lock-input') && !el.classList.contains('client-note')) el.disabled = !unlocked; });\n    zone.querySelectorAll('.btn-add, .btn-del, .pj-del-btn').forEach(b=>{ b.style.display = unlocked ? '' : 'none'; });\n    const statusEl = zone.querySelector('.zone-status');\n    if (statusEl) statusEl.textContent = unlocked ? '🔓 Modification activée' : '🔒 Lecture seule (sauf champs verts)';\n    const unlockBar = zone.querySelector('.zone-unlockbar');\n    if (unlockBar) unlockBar.style.display = unlocked ? 'none' : 'inline-flex';\n  });\n}\n\nfunction promptZoneUnlock(zoneKey) {\n  const wrap = document.getElementById(`${zoneKey}-pwdwrap`);\n  const btn = document.querySelector(`#${zoneKey}-pwdwrap`)?.previousElementSibling;\n  if (wrap) wrap.style.display = 'inline-block';\n  if (btn) btn.style.display = 'none';\n  const inp = document.getElementById(`${zoneKey}-pwd-input`);\n  if (inp) inp.focus();\n}\n\nfunction unlockZone(zoneKey) {\n  checkComptaPwd(`${zoneKey}-pwd-input`, null);\n}\n\nfunction recalc() {\n  applyReadonlyZones();\n  styleCatSelects();\n  syncEmpDep('v');\n  syncEmpDep('f');\n  calcImmoAmort('v');\n  calcImmoAmort('f');\n\n  // Vitry\n  let vRec=0;\n  document.querySelectorAll('#v-loy input[type=\"number\"],#v-prv input[type=\"number\"]').forEach(i=>vRec+=parseFloat(i.value)||0);\n  const vDep=sumTb('v-dep-tb'), vCF=vRec-vDep;\n  document.getElementById('v-rec').textContent=fmtS(vRec);\n  document.getElementById('v-dep').textContent=fmtS(vDep);\n  document.getElementById('v-cf').textContent=fmtS(vCF);\n  document.getElementById('v-nb').textContent=document.querySelectorAll('#v-loc tr').length;\n  document.getElementById('v-dep-tot').textContent=fmt(vDep);\n  const vLoy=sumTb('v-loy'), vPrv=sumTb('v-prv');\n  document.getElementById('v-loy-tot').textContent=fmt(vLoy);\n  document.getElementById('v-prv-tot').textContent=fmt(vPrv);\n  setBanner('v-banner','v-text',vRec,vDep);\n  renderCats('v-cats',catTotals('v-dep-tb'));\n\n  // Ferrieres\n  const fRec=airbnbData?airbnbData.totalNet:0;\n  const fBrut=airbnbData?airbnbData.totalBrut:0;\n  const fNuits=airbnbData?airbnbData.totalNuits:0;\n  const fDep=sumTb('f-dep-tb'), fCF=fRec-fDep;\n  document.getElementById('f-rec').textContent=fmtS(fRec);\n  document.getElementById('f-brut').textContent=fmtS(fBrut);\n  document.getElementById('f-dep').textContent=fmtS(fDep);\n  document.getElementById('f-nb').textContent=fNuits;\n  document.getElementById('f-dep-tot').textContent=fmt(fDep);\n  document.getElementById('f-rec-tot').textContent=fmt(fRec);\n  setBanner('f-banner','f-text',fRec,fDep);\n  renderCats('f-cats',catTotals('f-dep-tb'));\n\n  // Generales\n  const gDep=sumTb('g-dep-tb');\n  document.getElementById('g-dep').textContent=fmtS(gDep);\n  document.getElementById('g-nb').textContent=document.querySelectorAll('#g-dep-tb tr').length;\n  document.getElementById('g-dep-tot').textContent=fmt(gDep);\n  if(gDep>0){document.getElementById('g-banner').className='banner negative';document.getElementById('g-text').textContent=`${fmt(gDep)} de charges générales.`;}\n  else{document.getElementById('g-banner').className='banner neutral';document.getElementById('g-text').textContent='Aucune charge générale saisie.';}\n  renderCats('g-cats',catTotals('g-dep-tb'));\n\n  // Emprunts Vitry — mensualité saisie dans la fiche OU somme des échéances du mois courant\n  const vEmpMensFiche = (parseFloat(document.getElementById('v-emp-mens')?.value)||0) + (parseFloat(document.getElementById('v-emp-ass')?.value)||0);\n  let vEmpInt=0, vEmpAss=0, vEmpCap=0, vEchRows=0;\n  document.querySelectorAll('#v-ech-tb tr').forEach(tr=>{\n    const nums=tr.querySelectorAll('input[type=\"number\"]');\n    if(nums.length>=3){\n      vEmpCap+=parseFloat(nums[0]?.value)||0;\n      vEmpInt+=parseFloat(nums[1]?.value)||0;\n      vEmpAss+=parseFloat(nums[2]?.value)||0;\n      vEchRows++;\n    }\n  });\n  const vEmpEch = vEmpCap+vEmpInt+vEmpAss;\n  // Si des échéances sont saisies, utiliser leur moyenne mensuelle ; sinon la fiche\n  const vEmpMens = vEchRows>0 ? (vEmpEch/vEchRows) : vEmpMensFiche;\n  if(document.getElementById('v-emp-tot')) document.getElementById('v-emp-tot').textContent=fmt(vEmpMens);\n\n  // Emprunts Ferrières\n  const fEmpMensFiche = (parseFloat(document.getElementById('f-emp-mens')?.value)||0) + (parseFloat(document.getElementById('f-emp-ass')?.value)||0);\n  let fEmpInt=0, fEmpAss=0, fEmpCap=0, fEchRows=0;\n  document.querySelectorAll('#f-ech-tb tr').forEach(tr=>{\n    const nums=tr.querySelectorAll('input[type=\"number\"]');\n    if(nums.length>=3){\n      fEmpCap+=parseFloat(nums[0]?.value)||0;\n      fEmpInt+=parseFloat(nums[1]?.value)||0;\n      fEmpAss+=parseFloat(nums[2]?.value)||0;\n      fEchRows++;\n    }\n  });\n  const fEmpEch = fEmpCap+fEmpInt+fEmpAss;\n  const fEmpMens = fEchRows>0 ? (fEmpEch/fEchRows) : fEmpMensFiche;\n  if(document.getElementById('f-emp-tot')) document.getElementById('f-emp-tot').textContent=fmt(fEmpMens);\n\n  const empInt = vEmpInt+fEmpInt;\n  const empAss = vEmpAss+fEmpAss;\n  const empCap = vEmpCap+fEmpCap;\n  const empMens = vEmpMens+fEmpMens; // mensualité mensuelle totale\n\n  // Synthese\n  const totRec=vRec+fRec, totDep=vDep+fDep+gDep+empMens, totCF=totRec-totDep;\n  document.getElementById('syn-rec').textContent=fmtS(totRec);\n  document.getElementById('syn-dep').textContent=fmtS(totDep);\n  document.getElementById('syn-cf').textContent=fmtS(totCF);\n  document.getElementById('syn-rdt').textContent=totRec>0?((totCF/totRec)*100).toFixed(1)+'%':'—';\n  document.getElementById('sm-vr').textContent=fmt(vRec);\n  document.getElementById('sm-vd').textContent=fmt(vDep);\n  document.getElementById('sm-vc').textContent=fmt(vCF);\n  document.getElementById('sm-fr').textContent=fmt(fRec);\n  document.getElementById('sm-fd').textContent=fmt(fDep);\n  document.getElementById('sm-fc').textContent=fmt(fCF);\n  document.getElementById('sm-gd').textContent=fmt(gDep);\n  document.getElementById('sm-gc').textContent=fmt(-gDep);\n  setBanner('syn-banner','syn-text',totRec,totDep);\n  const allC={};\n  [catTotals('v-dep-tb'),catTotals('f-dep-tb'),catTotals('g-dep-tb')].forEach(c=>Object.entries(c).forEach(([k,v])=>allC[k]=(allC[k]||0)+v));\n  renderCats('syn-cats',allC);\n  renderAnalyse(totRec,totDep,totCF,vRec,fRec,vDep,fDep,gDep,empInt,empAss,empCap);\n\n  // Charts\n  if(ch1) ch1.destroy();\n  if(ch2) ch2.destroy();\n  const hasD=vDep+fDep+gDep>0;\n  ch1=new Chart(document.getElementById('chDep'),{type:'doughnut',data:{labels:['Vitry','Ferrières','Générales'],datasets:[{data:hasD?[vDep,fDep,gDep]:[1,1,1],backgroundColor:['rgba(178,98,45,.78)','rgba(0,169,110,.75)','rgba(169,122,46,.78)'],borderColor:['#5046e4','#00a96e','#d97706'],borderWidth:2,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#6b6e82',font:{family:'Outfit',size:11},padding:12,boxWidth:10}},tooltip:{callbacks:{label:ctx=>hasD?` ${ctx.label}: ${fmt(ctx.raw)}`:ctx.label}}},cutout:'62%'}});\n  ch2=new Chart(document.getElementById('chComp'),{type:'bar',data:{labels:['Vitry','Ferrières'],datasets:[{label:'Recettes',data:[vRec,fRec],backgroundColor:'rgba(0,169,110,.7)',borderColor:'#00a96e',borderWidth:1.5,borderRadius:5},{label:'Dépenses',data:[vDep,fDep],backgroundColor:'rgba(182,67,47,.78)',borderColor:'#e8294a',borderWidth:1.5,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#6b6e82',font:{family:'Outfit',size:11},padding:12,boxWidth:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw)}`}}},scales:{x:{grid:{color:'rgba(221,224,232,.5)'},ticks:{color:'#6b6e82',font:{family:'Outfit',size:11}}},y:{grid:{color:'rgba(221,224,232,.5)'},ticks:{color:'#6b6e82',font:{family:'DM Mono',size:10},callback:v=>v+' €'}}}}});\n\n  // Toute saisie (immobilisations, emprunt, dépenses, loyers…) met immédiatement à jour le journal des écritures et la balance\n  if (typeof genEcritures === 'function') genEcritures();\n}\n\n// ══ SAVE / LOAD ══\nconst SK='immo_v2';\nlet saveTimer=null;\n\nfunction saveData() {\n  function collectTb(id){\n    const rows=[];\n    document.querySelectorAll(`#${id} tr`).forEach(tr=>{\n      if(tr.dataset.auto) return; // lignes auto-générées depuis les données d'emprunt : jamais persistées, régénérées à chaque recalcul\n      const vals=[];\n      tr.querySelectorAll('input:not([type=\"file\"]),select').forEach(i=>vals.push(i.value));\n      if(vals.length) rows.push({vals, pj: JSON.parse(tr.dataset.pj||'[]')});\n    });\n    return rows;\n  }\n  const empFields = {};\n  ['v-emp-banque','v-emp-capital','v-emp-taux','v-emp-duree','v-emp-mens','v-emp-ass','f-emp-banque','f-emp-capital','f-emp-taux','f-emp-duree','f-emp-mens','f-emp-ass'].forEach(id=>{ const el=document.getElementById(id); if(el) empFields[id]=el.value; });\n  const data={vLoc:collectTb('v-loc'),vLoy:collectTb('v-loy'),vPrv:collectTb('v-prv'),vDep:collectTb('v-dep-tb'),vEch:collectTb('v-ech-tb'),fDep:collectTb('f-dep-tb'),fEch:collectTb('f-ech-tb'),gDep:collectTb('g-dep-tb'),vImmo:collectTb('v-immo-tb'),fImmo:collectTb('f-immo-tb'),n1:collectTb('n1-tb'),airbnb:airbnbData||null,empFields};\n  localStorage.setItem(SK,JSON.stringify(data));\n  const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);\n}\n\nfunction loadData() {\n  const raw=localStorage.getItem(SK);\n  if(!raw) return;\n  try {\n    const d=JSON.parse(raw);\n    function restoreTb(id,rows,addFn,...args){\n      if(!rows) return;\n      rows.forEach(r=>{\n        addFn(...args.map(()=>undefined));\n        const el=document.querySelector(`#${id} tr:last-child`);\n        const inputs=el.querySelectorAll('input,select');\n        r.forEach((v,i)=>{if(inputs[i])inputs[i].value=v;});\n      });\n    }\n    function restoreRows(rows, addFn, tbodyId) {\n      if(!rows) return;\n      rows.forEach(r=>{\n        const vals = r.vals || r; // compat ancienne sauvegarde\n        const pj = r.pj || [];\n        addFn();\n        const tr=document.querySelector(`#${tbodyId} tr:last-child`);\n        tr.querySelectorAll('input:not([type=\"file\"]),select').forEach((i,idx)=>{if(vals[idx]!==undefined)i.value=vals[idx];});\n        if(pj.length){\n          tr.dataset.pj=JSON.stringify(pj);\n          const cell=tr.querySelector('.pj-cell');\n          if(cell) pj.forEach(f=>addPJThumb(cell,f,tr));\n        }\n      });\n    }\n    if(d.vLoc) d.vLoc.forEach(r=>{addLocRow();const tr=document.querySelector('#v-loc tr:last-child');const vals=r.vals||r;tr.querySelectorAll('input:not([type=\"file\"]),select').forEach((i,idx)=>{if(vals[idx]!==undefined)i.value=vals[idx];});});\n    if(d.vLoy) restoreRows(d.vLoy, addLoyRow, 'v-loy');\n    if(d.vPrv) restoreRows(d.vPrv, addPrvRow, 'v-prv');\n    if(d.vDep) restoreRows(d.vDep, ()=>addDepRow('v-dep-tb'), 'v-dep-tb');\n    if(d.fDep) restoreRows(d.fDep, ()=>addDepRow('f-dep-tb'), 'f-dep-tb');\n    if(d.gDep) restoreRows(d.gDep, ()=>addDepRow('g-dep-tb'), 'g-dep-tb');\n    if(d.airbnb){airbnbData=d.airbnb;renderAirbnb(d.airbnb);showAirStatus('ok',`✅ Rapport Airbnb ${d.airbnb.annee} chargé · Net : ${fmt(d.airbnb.totalNet)}`);}\n    if(d.empFields){Object.entries(d.empFields).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v;});}\n    if(d.vEch) restoreRows(d.vEch, ()=>addEchRow('v-ech-tb'), 'v-ech-tb');\n    if(d.fEch) restoreRows(d.fEch, ()=>addEchRow('f-ech-tb'), 'f-ech-tb');\n    if(d.vImmo) restoreRows(d.vImmo, ()=>addImmoRow('v'), 'v-immo-tb');\n    if(d.fImmo) restoreRows(d.fImmo, ()=>addImmoRow('f'), 'f-immo-tb');\n    if(d.n1) restoreRows(d.n1, addN1Row, 'n1-tb');\n    recalc();\n  } catch(e){console.error(e);}\n}\n\nfunction clearAll() {\n  if(!confirm('Effacer toutes les données ? Action irréversible.')) return;\n  localStorage.removeItem(SK);\n  ['v-loc','v-loy','v-prv','v-dep-tb','f-dep-tb','g-dep-tb','v-immo-tb','f-immo-tb','n1-tb','v-ech-tb','f-ech-tb'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='';});\n  airbnbData=null;\n  document.getElementById('air-status').style.display='none';\n  document.getElementById('f-log').innerHTML='<tr><td colspan=\"6\"><div class=\"empty\"><div class=\"empty-icon\">📄<\u002Fdiv><p>Importez le rapport Airbnb PDF<\u002Fp><\u002Fdiv><\u002Ftd><\u002Ftr>';\n  document.getElementById('f-men').innerHTML='<tr><td colspan=\"3\" style=\"padding:20px;text-align:center;color:var(--dim)\">Importez le rapport PDF<\u002Ftd><\u002Ftr>';\n  recalc();\n}\n\ndocument.addEventListener('change', ()=>{clearTimeout(saveTimer);saveTimer=setTimeout(saveData,600);});\ndocument.addEventListener('input', ()=>{clearTimeout(saveTimer);saveTimer=setTimeout(saveData,600);});\n\n// ══ PLAN COMPTABLE ══\nlet PC = {\n  loyers:{n:'7061',l:'Loyers des logements'},provisions:{n:'7062',l:'Provisions sur charges'},\n  airbnb_rec:{n:'7068',l:'Recettes Airbnb'},airbnb_frais:{n:'6226',l:'Commissions Airbnb'},\n  charges:{n:'6060',l:'Charges diverses'},assurance:{n:'6160',l:\"Primes d'assurance\"},\n  honoraires:{n:'6226',l:'Honoraires comptables'},emprunt:{n:'1641',l:'Emprunt immobilier'},\n  interets:{n:'6615',l:'Intérêts des emprunts'},taxe_fonc:{n:'6350',l:'Taxes foncières'},\n  cfe:{n:'6351',l:'CFE'},copropriete:{n:'6132',l:'Charges de copropriété'},\n  mobilier:{n:'2184',l:'Mobilier'},\n  banque:{n:'108',l:'Compte exploitant'},autre:{n:'6288',l:'Autres charges'},\n  dotations:{n:'6811',l:'Dotations amortissements corporels'},\n};\nconst PC_LABELS={loyers:'Loyers',provisions:'Provisions charges',airbnb_rec:'Recettes Airbnb (produit)',airbnb_frais:'Frais Airbnb (charge)',charges:'Charges diverses',assurance:'Assurance',honoraires:'Honoraires',emprunt:'Emprunt',interets:'Intérêts',taxe_fonc:'Taxe foncière',cfe:'CFE',copropriete:'Copropriété',mobilier:'Mobilier',banque:'Compte exploitant (108)',autre:'Autres charges',dotations:'Dotations amortissements'};\n\n// Mot-clé court par catégorie, utilisé dans le libellé des écritures (nom fournisseur - mot produit - bien concerné)\nconst CAT_MOT = {\n  '6061 - Fournitures non stockables (eau, énergie)':'Énergie',\n  '6063 - Fournitures entretien et petit équipement':'Entretien',\n  '6064 - Fournitures administratives':'Fournitures admin.',\n  '6068 - Autres matières et fournitures':'Fournitures',\n  '6111 - Sous-traitance générale':'Sous-traitance',\n  '6132 - Charges de copropriété':'Copropriété',\n  '6135 - Locations mobilières':'Location mobilière',\n  '6155 - Entretien et réparations immobiliers':'Travaux',\n  '6156 - Entretien et réparations mobiliers':'Réparation',\n  '6160 - Primes d assurance':'Assurance',\n  '6226 - Commissions et courtages (Airbnb, agences)':'Commission',\n  '6228 - Honoraires comptables et juridiques':'Honoraires',\n  '6261 - Téléphonie et internet':'Téléphonie',\n  '6270 - Frais bancaires':'Frais bancaires',\n  '6350 - Taxe foncière':'Taxe foncière',\n  '6351 - CFE':'CFE',\n  '6354 - Taxe ordures ménagères':'Ordures ménagères',\n  '6615 - Intérêts des emprunts':'Intérêts emprunt',\n  '6616 - Intérêts bancaires':'Intérêts bancaires',\n  '6811 - Dotations amortissements corporels':'Amortissement',\n  '2181 - Agencements et aménagements':'Agencements',\n  '2184 - Mobilier':'Mobilier',\n  '2183 - Matériel bureau et informatique':'Matériel',\n  '6288 - Autres charges diverses':'Autres charges',\n};\nfunction catToMot(cat){ return CAT_MOT[cat] || (cat ? cat.replace(/^\\d{4,6}\\s*-\\s*/,'') : 'Charge'); }\n\nfunction renderPC() {\n  document.getElementById('pc-grid').innerHTML=Object.entries(PC).map(([k,c])=>`\n    <div class=\"cr\"><label>${PC_LABELS[k]||k}<\u002Flabel>\n    <input class=\"cn\" value=\"${c.n}\" onchange=\"PC['${k}'].n=this.value\" title=\"N° compte\">\n    <input class=\"cl\" value=\"${c.l}\" onchange=\"PC['${k}'].l=this.value\" title=\"Libellé\"><\u002Fdiv>`).join('');\n}\n\nasync function importPC(file) {\n  if(!file) return;\n  const el=document.getElementById('pc-status');\n  el.style.display='flex';el.style.background='rgba(80,70,228,.07)';el.style.color='var(--blue)';el.style.border='1px solid rgba(80,70,228,.2)';el.style.borderRadius='8px';el.style.alignItems='center';el.textContent='⏳ Lecture…';\n  try {\n    const ab=await file.arrayBuffer();\n    const pdf=await pdfjsLib.getDocument({data:ab}).promise;\n    let txt='';\n    for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();txt+=c.items.map(x=>x.str).join(' ')+'\\n';}\n    const r=/\\b(\\d{4,6})\\s+([A-Za-zÀ-ÿ][^\\d\\n]{5,80})/g;\n    let m,cnt=0,found={};\n    while((m=r.exec(txt))!==null){found[m[1]]=m[2].trim();cnt++;}\n    Object.entries(PC).forEach(([k,c])=>{if(found[c.n])PC[k].l=found[c.n];});\n    renderPC();\n    el.style.background='rgba(0,169,110,.07)';el.style.color='var(--green)';el.style.borderColor='rgba(0,169,110,.2)';\n    el.textContent=`✅ ${cnt} comptes détectés. Libellés mis à jour.`;\n  } catch(e){el.style.background='rgba(232,41,74,.07)';el.style.color='var(--red)';el.textContent='❌ Erreur lecture PDF.';}\n}\n\nfunction catToPC(cat){\n  const map = {\n    '6061 - Fournitures non stockables (eau, énergie)': 'charges',\n    '6063 - Fournitures entretien et petit équipement': 'charges',\n    '6064 - Fournitures administratives': 'charges',\n    '6068 - Autres matières et fournitures': 'charges',\n    '6111 - Sous-traitance générale': 'charges',\n    '6132 - Charges de copropriété': 'copropriete',\n    '6135 - Locations mobilières': 'charges',\n    '6155 - Entretien et réparations immobiliers': 'charges',\n    '6156 - Entretien et réparations mobiliers': 'charges',\n    '6160 - Primes d assurance': 'assurance',\n    '6226 - Commissions et courtages (Airbnb, agences)': 'airbnb_frais',\n    '6228 - Honoraires comptables et juridiques': 'honoraires',\n    '6261 - Téléphonie et internet': 'charges',\n    '6270 - Frais bancaires': 'charges',\n    '6350 - Taxe foncière': 'taxe_fonc',\n    '6351 - CFE': 'cfe',\n    '6354 - Taxe ordures ménagères': 'charges',\n    '6615 - Intérêts des emprunts': 'interets',\n    '6616 - Intérêts bancaires': 'interets',\n    '6811 - Dotations amortissements corporels': 'charges',\n    '2181 - Agencements et aménagements': 'mobilier',\n    '2184 - Mobilier': 'mobilier',\n    '2183 - Matériel bureau et informatique': 'mobilier',\n    '6288 - Autres charges diverses': 'autre',\n  };\n  return map[cat] || 'autre';\n}\n\n// ══ GÉNÉRATION ÉCRITURES ══\n// Règle : toute écriture générée oppose le compte de charge / d'immobilisation / de produit\n// DIRECTEMENT au compte 108 (compte de l'exploitant) — pas de compte tiers intermédiaire.\n// Libellé : \"Tiers - Mot du produit - Bien concerné\"\nlet ecData=[], pNum=1, ecPJ={};\n\nfunction genEcritures() {\n  ecData=[]; pNum=1; ecPJ={};\n  const annee=new Date().getFullYear();\n  const p=()=>`ECR-${String(pNum++).padStart(4,'0')}`;\n  const linkPJ=(id,tr)=>{ const pj=JSON.parse(tr?.dataset?.pj||'[]'); if(pj.length) ecPJ[id]=pj; };\n\n  // Loyers (Vitry sur Seine)\n  document.querySelectorAll('#v-loy tr').forEach(tr=>{\n    const i=tr.querySelectorAll('input');\n    const amt=parseFloat(i[4]?.value)||0; if(!amt) return;\n    const date=i[0]?.value?i[0].value+'-01':`${annee}-01-01`;\n    const loc=i[1]?.value||'Locataire';\n    const lib=`${loc} - Loyer - Vitry sur Seine`;\n    const id=p();\n    ecData.push({id,date,j:'VT',c:PC.banque.n,cl:PC.banque.l,lib,d:amt,cr:0});\n    ecData.push({id,date,j:'VT',c:PC.loyers.n,cl:PC.loyers.l,lib,d:0,cr:amt});\n    linkPJ(id,tr);\n  });\n  // Provisions (Vitry sur Seine)\n  document.querySelectorAll('#v-prv tr').forEach(tr=>{\n    const i=tr.querySelectorAll('input');\n    const amt=parseFloat(i[4]?.value)||0; if(!amt) return;\n    const date=i[0]?.value?i[0].value+'-01':`${annee}-01-01`;\n    const loc=i[1]?.value||'Locataire';\n    const lib=`${loc} - Provision charges - Vitry sur Seine`;\n    const id=p();\n    ecData.push({id,date,j:'VT',c:PC.banque.n,cl:PC.banque.l,lib,d:amt,cr:0});\n    ecData.push({id,date,j:'VT',c:PC.provisions.n,cl:PC.provisions.l,lib,d:0,cr:amt});\n    linkPJ(id,tr);\n  });\n  // Airbnb recettes (Ferrières en Brie)\n  if(airbnbData){\n    const MOIS_IDX={Janvier:1,Février:2,Mars:3,Avril:4,Mai:5,Juin:6,Juillet:7,Août:8,Septembre:9,Octobre:10,Novembre:11,Décembre:12};\n    airbnbData.mensuels.forEach(m=>{\n      if(!m.brut) return;\n      const mn=String(MOIS_IDX[m.mois]||1).padStart(2,'0');\n      const date=`${airbnbData.annee}-${mn}-01`;\n      const lib=`Airbnb - Recette ${m.mois} ${airbnbData.annee} - Ferrières en Brie`;\n      const id=p();\n      ecData.push({id,date,j:'FB',c:PC.banque.n,cl:PC.banque.l,lib,d:m.brut,cr:0});\n      ecData.push({id,date,j:'FB',c:PC.airbnb_rec.n,cl:PC.airbnb_rec.l,lib,d:0,cr:m.brut});\n    });\n    const frais=Math.abs(airbnbData.totalFrais);\n    if(frais>0){\n      const id=p();\n      const lib=`Airbnb - Commission ${airbnbData.annee} - Ferrières en Brie`;\n      ecData.push({id,date:`${airbnbData.annee}-12-31`,j:'OD',c:PC.airbnb_frais.n,cl:PC.airbnb_frais.l,lib,d:frais,cr:0});\n      ecData.push({id,date:`${airbnbData.annee}-12-31`,j:'OD',c:PC.banque.n,cl:PC.banque.l,lib,d:0,cr:frais});\n    }\n  }\n  // Dépenses / immobilisations (Vitry sur Seine / Ferrières en Brie / Charges Générales)\n  [['v-dep-tb','VT','Vitry sur Seine'],['f-dep-tb','FB','Ferrières en Brie'],['g-dep-tb','OD','Charges Générales']].forEach(([tid,j,bienLbl])=>{\n    document.querySelectorAll(`#${tid} tr`).forEach(tr=>{\n      const inputs=tr.querySelectorAll('input');\n      const numInputs=tr.querySelectorAll('input[type=\"number\"]');\n      const sel=tr.querySelector('select');\n      const amt=parseFloat(numInputs[numInputs.length-1]?.value)||0; if(!amt) return;\n      const date=inputs[0]?.value||`${annee}-01-01`;\n      const fourn=inputs[1]?.value||'Fournisseur';\n      const cat=sel?.value||'AUTRE';\n      const pk=catToPC(cat);\n      const mot=catToMot(cat);\n      const lib=`${fourn} - ${mot} - ${bienLbl}`;\n      const id=p();\n      ecData.push({id,date,j,c:PC[pk].n,cl:PC[pk].l,lib,d:amt,cr:0});\n      ecData.push({id,date,j,c:PC.banque.n,cl:PC.banque.l,lib,d:0,cr:amt});\n      linkPJ(id,tr);\n    });\n  });\n\n  // Dotations aux amortissements (Vitry sur Seine / Ferrières en Brie) — non-monétaire : 6811 en charge / 28xxx en amortissement cumulé (pas de contrepartie 108, ce n'est pas un flux de trésorerie)\n  [['v','Vitry sur Seine'],['f','Ferrières en Brie']].forEach(([bien,bienLbl])=>{\n    document.querySelectorAll(`#${bien}-immo-tb tr`).forEach(tr=>{\n      const designation = tr.querySelector('input[type=\"text\"]')?.value || 'Immobilisation';\n      const compteSel = tr.querySelector('select')?.value || '';\n      const compteNum = (compteSel.match(/^(\\d+)/) || [])[1];\n      const compteLib = compteSel.split(' - ')[1] || compteSel;\n      const vo = parseFloat(tr.querySelector('[data-f=\"vo\"]')?.value) || 0;\n      const duree = parseFloat(tr.querySelector('[data-f=\"duree\"]')?.value) || 0;\n      const dotAnnuelle = duree > 0 ? vo/duree : 0;\n      if (!compteNum || compteNum === '211' || dotAnnuelle <= 0) return;\n      const amortCompte = '28' + compteNum.slice(1); // convention PCG : 2181→28181, 2183→28183, 2184→28184\n      const lib = `${designation} - Dotation amortissement - ${bienLbl}`;\n      const dateEc = `${annee}-12-31`;\n      const id = p();\n      ecData.push({id, date: dateEc, j: 'OD', c: PC.dotations.n, cl: PC.dotations.l, lib, d: dotAnnuelle, cr: 0});\n      ecData.push({id, date: dateEc, j: 'OD', c: amortCompte, cl: `Amortissements ${compteLib}`, lib, d: 0, cr: dotAnnuelle});\n    });\n  });\n\n  const tb=document.getElementById('ec-tbody');\n  tb.innerHTML='';\n  if(!ecData.length){document.getElementById('ec-status').textContent='Aucune donnée à générer.';document.getElementById('ec-table').style.display='none';return;}\n  ecData.forEach(e=>{\n    const tr=document.createElement('tr');\n    tr.innerHTML=`\n      <td style=\"font-family:'DM Mono',monospace;font-size:12px\">${e.id}<\u002Ftd>\n      <td style=\"font-family:'DM Mono',monospace;font-size:12px\">${e.date}<\u002Ftd>\n      <td><span style=\"background:rgba(80,70,228,.1);color:var(--blue);padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700\">${e.j}<\u002Fspan><\u002Ftd>\n      <td>${compteTagHtml(e.c)}<\u002Ftd>\n      <td style=\"font-size:12px;color:var(--muted)\">${e.cl}<\u002Ftd>\n      <td style=\"font-size:12px\">${e.lib}<\u002Ftd>\n      <td style=\"${e.d?'color:var(--red);font-family:DM Mono,monospace;text-align:right;font-weight:600':''}\">${e.d?fmt(e.d):''}<\u002Ftd>\n      <td style=\"${e.cr?'color:var(--green);font-family:DM Mono,monospace;text-align:right;font-weight:600':''}\">${e.cr?fmt(e.cr):''}<\u002Ftd>`;\n    tb.appendChild(tr);\n  });\n  const nbPJ=Object.values(ecPJ).reduce((s,arr)=>s+arr.length,0);\n  document.getElementById('ec-status').textContent=`${ecData.length} lignes · ${ecData.length/2|0} écritures générées${nbPJ?` · 📎 ${nbPJ} pièce(s) jointe(s) liée(s), incluses dans l'export`:''}`;\n  document.getElementById('ec-table').style.display='table';\n  renderBalance();\n}\n\n// ══ BALANCE N-1 & BALANCE GÉNÉRALE / RÉSULTAT COMPTABLE ══\nasync function importN1(file) {\n  if (!file) return;\n  const el = document.getElementById('n1-status');\n  el.style.display='flex'; el.style.alignItems='center'; el.style.gap='8px'; el.style.borderRadius='8px';\n  el.style.background='rgba(80,70,228,.07)'; el.style.color='var(--blue)'; el.style.border='1px solid rgba(80,70,228,.2)';\n  el.textContent='⏳ Lecture du PDF…';\n  try {\n    const ab = await file.arrayBuffer();\n    const pdf = await pdfjsLib.getDocument({data: ab}).promise;\n    let txt = '';\n    for (let i=1; i<=pdf.numPages; i++) {\n      const page = await pdf.getPage(i);\n      const content = await page.getTextContent();\n      let lastY = null, line = '';\n      const lines = [];\n      content.items.forEach(item => {\n        if (lastY !== null && Math.abs(item.transform[5]-lastY) > 3) { lines.push(line); line=''; }\n        line += item.str + ' ';\n        lastY = item.transform[5];\n      });\n      if (line) lines.push(line);\n      txt += lines.join('\\n') + '\\n';\n    }\n    // Ligne type balance : N° compte + libellé + 1 ou 2 montants (solde, ou débit + crédit)\n    const lineRe = /^\\s*(\\d{3,8})\\s+([A-Za-zÀ-ÿ0-9][^\\d\\n]{2,70}?)\\s+(-?[\\d\\s]{1,12},\\d{2})\\s*€?\\s*(-?[\\d\\s]{1,12},\\d{2})?\\s*€?\\s*$/;\n    const parsed = [];\n    txt.split('\\n').forEach(raw => {\n      const m = raw.trim().match(lineRe);\n      if (!m) return;\n      const compte = m[1];\n      const lib = m[2].trim();\n      const num1 = parseNum(m[3]);\n      const num2 = m[4] ? parseNum(m[4]) : null;\n      const montant = num2 !== null ? (num1 - num2) : num1;\n      if (montant !== 0 || num2 !== null) parsed.push({compte, lib, montant});\n    });\n    if (!parsed.length) throw new Error('Aucune ligne de balance détectée dans ce PDF.');\n    const replace = document.querySelectorAll('#n1-tb tr').length === 0 || confirm(`${parsed.length} compte(s) détecté(s) dans le PDF. Remplacer la balance N-1 actuelle ?`);\n    if (replace) {\n      document.getElementById('n1-tb').innerHTML = '';\n      parsed.forEach(p => addN1Row(p.compte, p.lib, p.montant.toFixed(2)));\n      renderBalance();\n      saveData();\n    }\n    el.style.background='rgba(0,169,110,.07)'; el.style.color='var(--green)'; el.style.borderColor='rgba(0,169,110,.2)';\n    el.textContent = `✅ ${parsed.length} compte(s) importé(s) · vérifiez les montants avant de vous y fier.`;\n  } catch (e) {\n    console.error(e);\n    el.style.background='rgba(232,41,74,.07)'; el.style.color='var(--red)'; el.style.borderColor='rgba(232,41,74,.2)';\n    el.textContent = '❌ Lecture automatique impossible sur ce PDF (mise en page non reconnue). Ajoutez les comptes manuellement ci-dessous.';\n  }\n}\n\nfunction addN1Row(compte='', lib='', montant='') {\n  const tb = document.getElementById('n1-tb');\n  if (!tb) return;\n  const tr = document.createElement('tr');\n  tr.innerHTML = `\n    <td><input type=\"text\" placeholder=\"Ex : 7061\" value=\"${compte}\" style=\"width:90px;font-family:'DM Mono',monospace\" onchange=\"renderBalance()\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Libellé\" value=\"${lib}\" onchange=\"renderBalance()\"><\u002Ftd>\n    <td><input type=\"number\" step=\"0.01\" placeholder=\"0,00\" value=\"${montant}\" style=\"text-align:right;width:110px\" onchange=\"renderBalance()\"><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n}\n\nfunction getSoldesN1() {\n  const m = {};\n  document.querySelectorAll('#n1-tb tr').forEach(tr=>{\n    const inputs = tr.querySelectorAll('input');\n    const compte = (inputs[0]?.value||'').trim();\n    const montant = parseFloat(inputs[2]?.value)||0;\n    if (compte) m[compte] = { lib: inputs[1]?.value||'', montant };\n  });\n  return m;\n}\n\nfunction renderBalance() {\n  const summaryEl = document.getElementById('balance-summary');\n  const tableEl = document.getElementById('balance-table');\n  if (!summaryEl) return;\n  if (!ecData || !ecData.length) {\n    summaryEl.innerHTML = '<div class=\"empty\"><div class=\"empty-icon\">📊<\u002Fdiv><p>Générez d\\'abord les écritures pour calculer la balance.<\u002Fp><\u002Fdiv>';\n    if (tableEl) tableEl.style.display = 'none';\n    return;\n  }\n  const comptes = {};\n  ecData.forEach(e=>{\n    if (!comptes[e.c]) comptes[e.c] = { lib: e.cl, deb: 0, cr: 0 };\n    comptes[e.c].deb += e.d; comptes[e.c].cr += e.cr;\n  });\n  const n1 = getSoldesN1();\n  let totProd=0, totCharges=0, totProdN1=0, totChargesN1=0;\n  const rows = Object.entries(comptes).sort((a,b)=>a[0].localeCompare(b[0])).map(([c,v])=>{\n    const classe = c.charAt(0);\n    const solde = classe==='7' ? (v.cr-v.deb) : (v.deb-v.cr);\n    if (classe==='7') totProd += solde;\n    if (classe==='6') totCharges += solde;\n    const n1Entry = n1[c];\n    const n1v = n1Entry ? n1Entry.montant : null;\n    if (n1v!=null) { if (classe==='7') totProdN1 += n1v; if (classe==='6') totChargesN1 += n1v; }\n    const variation = n1v!=null ? solde-n1v : null;\n    return { c, lib: v.lib, deb: v.deb, cr: v.cr, solde, n1v, variation };\n  });\n  const resultatN = totProd - totCharges;\n  const hasN1 = Object.keys(n1).length>0;\n  const resultatN1 = hasN1 ? (totProdN1-totChargesN1) : null;\n  const varRes = hasN1 ? resultatN-resultatN1 : null;\n\n  summaryEl.innerHTML = `\n    <div class=\"kpi-grid\" style=\"margin-bottom:0\">\n      <div class=\"kpi green\"><div class=\"kpi-accent\"><\u002Fdiv><div class=\"kpi-label\">Total Produits N<\u002Fdiv><div class=\"kpi-val\">${fmt(totProd)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi red\"><div class=\"kpi-accent\"><\u002Fdiv><div class=\"kpi-label\">Total Charges N<\u002Fdiv><div class=\"kpi-val\">${fmt(totCharges)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"kpi ${resultatN>=0?'blue':'red'}\"><div class=\"kpi-accent\"><\u002Fdiv><div class=\"kpi-label\">Résultat comptable N<\u002Fdiv><div class=\"kpi-val\">${fmt(resultatN)}<\u002Fdiv><\u002Fdiv>\n      ${hasN1?`<div class=\"kpi gold\"><div class=\"kpi-accent\"><\u002Fdiv><div class=\"kpi-label\">Résultat N-1<\u002Fdiv><div class=\"kpi-val\">${fmt(resultatN1)}<\u002Fdiv><div class=\"kpi-sub\">Variation N/N-1 : ${varRes>=0?'+':''}${fmt(varRes)}<\u002Fdiv><\u002Fdiv>`:'<div class=\"kpi\"><div class=\"kpi-accent\"><\u002Fdiv><div class=\"kpi-label\">Résultat N-1<\u002Fdiv><div class=\"kpi-val\" style=\"color:var(--dim)\">—<\u002Fdiv><div class=\"kpi-sub\">Renseignez la balance N-1 ci-dessus<\u002Fdiv><\u002Fdiv>'}\n    <\u002Fdiv>`;\n\n  const tb = document.getElementById('balance-tbody');\n  tb.innerHTML = rows.map(r=>`\n    <tr>\n      <td>${compteTagHtml(r.c)}<\u002Ftd>\n      <td style=\"font-size:12px;color:var(--muted)\">${r.lib}<\u002Ftd>\n      <td class=\"mono\">${r.deb?fmt(r.deb):'—'}<\u002Ftd>\n      <td class=\"mono\">${r.cr?fmt(r.cr):'—'}<\u002Ftd>\n      <td class=\"mono\" style=\"font-weight:700\">${fmt(r.solde)}<\u002Ftd>\n      <td class=\"mono\" style=\"color:var(--muted)\">${r.n1v!=null?fmt(r.n1v):'—'}<\u002Ftd>\n      <td class=\"mono\" style=\"${r.variation==null?'':(r.variation>=0?'color:var(--green)':'color:var(--red)')}\">${r.variation!=null?(r.variation>=0?'+':'')+fmt(r.variation):'—'}<\u002Ftd>\n    <\u002Ftr>`).join('');\n  if (tableEl) tableEl.style.display = 'table';\n}\n\n// ── Convertit une pièce jointe (dataURL base64) en octets pour le ZIP ──\nfunction b64ToBytes(dataUrl){\n  const base64=(dataUrl.split(',')[1]||dataUrl);\n  const bin=atob(base64);\n  const arr=new Uint8Array(bin.length);\n  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);\n  return arr;\n}\n\n// ── Télécharge le fichier principal seul, ou un ZIP (fichier + pièces jointes) si des PJ sont liées ──\nasync function dlWithPJ(content,filename,type){\n  const nbPJ=Object.values(ecPJ).reduce((s,arr)=>s+arr.length,0);\n  if(!nbPJ || typeof JSZip==='undefined'){ dl(content,filename,type); return; }\n  const zip=new JSZip();\n  zip.file(filename, content);\n  const folder=zip.folder('Pieces_jointes');\n  Object.entries(ecPJ).forEach(([id,files])=>{\n    files.forEach(f=>{\n      const safeName=(f.name||'document').replace(/[\\/\\\\:*?\"<>|]/g,'_');\n      folder.file(`${id}_${safeName}`, b64ToBytes(f.b64));\n    });\n  });\n  const blob=await zip.generateAsync({type:'blob'});\n  const a=document.createElement('a');\n  a.href=URL.createObjectURL(blob);\n  a.download=filename.replace(/\\.(txt|csv)$/,'')+'_avec_pieces_jointes.zip';\n  a.click();\n}\n\nasync function exportFEC() {\n  if(!ecData.length){alert('Générez d\\'abord les écritures.');return;}\n  const yr=new Date().getFullYear();\n  const hdr='JournalCode|JournalLib|EcritureNum|EcritureDate|CompteNum|CompteLib|CompAuxNum|CompAuxLib|PieceRef|PieceDate|EcritureLib|Debit|Credit|EcritureLet|DateLet|ValidDate|Montantdevise|Idevise\\n';\n  const lines=ecData.map(e=>{\n    const ds=e.date.replace(/-/g,'');\n    return `${e.j}|Journal ${e.j}|${e.id}|${ds}|${e.c}|${e.cl}|||${e.id}|${ds}|${e.lib}|${e.d.toFixed(2).replace('.',',')}|${e.cr.toFixed(2).replace('.',',')}||||0,00|EUR`;\n  }).join('\\n');\n  await dlWithPJ('\\uFEFF'+hdr+lines,`FEC_IMMO_${yr}.txt`,'text/plain');\n}\n\nasync function exportCSV() {\n  if(!ecData.length){alert('Générez d\\'abord les écritures.');return;}\n  const yr=new Date().getFullYear();\n  const hdr='N° Pièce;Date;Journal;N° Compte;Libellé compte;Libellé écriture;Débit (€);Crédit (€)\\n';\n  const lines=ecData.map(e=>`${e.id};${e.date};${e.j};${e.c};\"${e.cl}\";\"${e.lib}\";${e.d?e.d.toFixed(2).replace('.',','):''};${e.cr?e.cr.toFixed(2).replace('.',','): ''}`).join('\\n');\n  await dlWithPJ('\\uFEFF'+hdr+lines,`JOURNAL_IMMO_${yr}.csv`,'text/csv');\n}\n\nfunction dl(content,filename,type){\n  const a=document.createElement('a');\n  a.href=URL.createObjectURL(new Blob([content],{type:type+';charset=utf-8'}));\n  a.download=filename;a.click();\n}\n\n// ══ PIÈCES JOINTES ══\nfunction renderPJThumbs(pjArr) { return ''; } // placeholders remplacés par addPJThumb\n\nfunction addPJFiles(input) {\n  const tr = input.closest('tr');\n  const cell = input.closest('.pj-cell');\n  const files = Array.from(input.files);\n  files.forEach(file => {\n    const reader = new FileReader();\n    reader.onload = e => {\n      const data = { name: file.name, type: file.type, b64: e.target.result };\n      if (!tr.dataset.pj) tr.dataset.pj = '[]';\n      const arr = JSON.parse(tr.dataset.pj);\n      arr.push(data);\n      tr.dataset.pj = JSON.stringify(arr);\n      addPJThumb(cell, data, tr);\n      saveData();\n    };\n    reader.readAsDataURL(file);\n  });\n  input.value = '';\n}\n\nfunction addPJThumb(cell, data, tr) {\n  const label = cell.querySelector('label.pj-btn');\n  const span = document.createElement('span');\n  span.className = 'pj-thumb';\n  const icon = data.type.startsWith('image') ? '🖼️' : '📄';\n  span.innerHTML = `${icon} ${data.name.length > 14 ? data.name.slice(0,12)+'…' : data.name} <span class=\"pj-del-btn\" style=\"color:var(--red);margin-left:2px\">✕<\u002Fspan>`;\n  span.querySelector('span').onclick = e => {\n    e.stopPropagation();\n    const arr = JSON.parse(tr.dataset.pj || '[]');\n    const idx = arr.findIndex(f => f.name === data.name && f.b64 === data.b64);\n    if (idx > -1) arr.splice(idx, 1);\n    tr.dataset.pj = JSON.stringify(arr);\n    span.remove();\n    saveData();\n  };\n  span.onclick = () => openPJ(data);\n  cell.insertBefore(span, label);\n}\n\nfunction openPJ(data) {\n  const modal = document.getElementById('pj-modal');\n  const body = document.getElementById('pj-modal-body');\n  if (data.type.startsWith('image')) {\n    body.innerHTML = `<img src=\"${data.b64}\" alt=\"${data.name}\"><p style=\"text-align:center;font-size:12px;color:var(--muted);margin-top:8px\">${data.name}<\u002Fp>`;\n  } else {\n    body.innerHTML = `<iframe src=\"${data.b64}\"><\u002Fiframe><p style=\"text-align:center;font-size:12px;color:var(--muted);margin-top:8px\">${data.name}<\u002Fp>`;\n  }\n  modal.classList.add('open');\n}\n\nfunction closePJ() {\n  document.getElementById('pj-modal').classList.remove('open');\n  document.getElementById('pj-modal-body').innerHTML = '';\n}\n\ndocument.getElementById('pj-modal').addEventListener('click', e => { if(e.target===document.getElementById('pj-modal')) closePJ(); });\n\n// ══ OCR SYSTÈME ══\nlet ocrMode = 'depense';\nlet ocrTargetTable = 'v-dep-tb';\nlet ocrResult = null;\nlet ocrFileData = null;\n\nfunction openOCR(mode, tableId) {\n  ocrMode = mode;\n  ocrTargetTable = tableId || 'v-dep-tb';\n  ocrResult = null;\n  ocrFileData = null;\n  // Reset UI\n  document.getElementById('ocr-preview').style.display = 'none';\n  document.getElementById('ocr-preview').innerHTML = '';\n  document.getElementById('ocr-status').style.display = 'none';\n  document.getElementById('ocr-fields-wrap').style.display = 'none';\n  document.getElementById('ocr-fields').innerHTML = '';\n  document.getElementById('ocr-confirm-btn').style.display = 'none';\n  document.getElementById('ocr-file-input').value = '';\n  const descs = {\n    depense: 'Importez une facture, un ticket ou un reçu — Claude extrait la date, le fournisseur, le montant et suggère la catégorie.',\n    loyer: 'Importez une quittance de loyer — Claude extrait le locataire, le montant et la période.',\n    provision: 'Importez un document de charges — Claude extrait le montant et la période.',\n    emprunt: 'Importez un tableau d\\'amortissement ou un relevé bancaire — l\\'OCR extrait automatiquement le capital, les intérêts et l\\'assurance emprunteur.'\n  };\n  document.getElementById('ocr-modal-desc').textContent = descs[mode] || descs.depense;\n  document.getElementById('ocr-modal').style.display = 'flex';\n}\n\nfunction closeOCR() {\n  document.getElementById('ocr-modal').style.display = 'none';\n}\n\nasync function handleOCRFile(file) {\n  if (!file) return;\n  // Prévisualisation\n  const prev = document.getElementById('ocr-preview');\n  prev.style.display = 'flex';\n  if (file.type.startsWith('image/')) {\n    const url = URL.createObjectURL(file);\n    prev.innerHTML = `<img src=\"${url}\" alt=\"Aperçu\">`;\n  } else {\n    prev.innerHTML = `<div style=\"padding:20px;font-size:13px;color:var(--muted)\">📄 ${file.name}<\u002Fdiv>`;\n  }\n  // Convertir en base64\n  const b64 = await new Promise(res => {\n    const r = new FileReader();\n    r.onload = e => res(e.target.result);\n    r.readAsDataURL(file);\n  });\n  ocrFileData = { name: file.name, type: file.type, b64 };\n  // Lancer l'analyse\n  await analyseOCR(b64, file.type, file.name);\n}\n\nasync function analyseOCR(b64Data, mimeType, filename) {\n  const status = document.getElementById('ocr-status');\n  status.style.display = 'block';\n  status.style.color = 'var(--blue)';\n  status.innerHTML = `<span class=\"ocr-spinner\"><\u002Fspan> Lecture du document…`;\n  document.getElementById('ocr-fields-wrap').style.display = 'none';\n  document.getElementById('ocr-confirm-btn').style.display = 'none';\n\n  try {\n    let text = '';\n\n    if (mimeType === 'application/pdf') {\n      // ── PDF vectoriel : extraction directe du texte via PDF.js ──\n      status.innerHTML = `<span class=\"ocr-spinner\"><\u002Fspan> Extraction du texte PDF…`;\n      const pureB64 = b64Data.split(',')[1];\n      const binary = atob(pureB64);\n      const bytes = new Uint8Array(binary.length);\n      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);\n      const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;\n      for (let i = 1; i <= pdf.numPages; i++) {\n        const page = await pdf.getPage(i);\n        const content = await page.getTextContent();\n        // Reconstituer le texte en respectant les positions X/Y pour les tableaux\n        const items = content.items;\n        let lastY = null;\n        items.forEach(item => {\n          if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) text += '\\n';\n          text += item.str + ' ';\n          lastY = item.transform[5];\n        });\n        text += '\\n';\n      }\n      // Si le PDF ne contient pas de texte extractible → fallback Tesseract\n      if (text.replace(/\\s/g,'').length < 50) {\n        status.innerHTML = `<span class=\"ocr-spinner\"><\u002Fspan> PDF scanné détecté, OCR en cours…`;\n        text = await runTesseract(b64Data, mimeType, status);\n      }\n    } else {\n      // ── Image : Tesseract ──\n      text = await runTesseract(b64Data, mimeType, status);\n    }\n\n    status.innerHTML = `<span class=\"ocr-spinner\"><\u002Fspan> Analyse des données…`;\n    const parsed = parseOCRText(text, ocrMode);\n    status.style.display = 'none';\n    renderOCRFields(parsed);\n\n  } catch(e) {\n    console.error(e);\n    status.innerHTML = `❌ Erreur : ${e.message}`;\n    status.style.color = 'var(--red)';\n  }\n}\n\nasync function runTesseract(b64Data, mimeType, status) {\n  if (typeof Tesseract === 'undefined') {\n    await new Promise((res, rej) => {\n      const s = document.createElement('script');\n      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js';\n      s.onload = res; s.onerror = rej;\n      document.head.appendChild(s);\n    });\n  }\n  let imageUrl = b64Data;\n  if (mimeType === 'application/pdf') {\n    const pureB64 = b64Data.split(',')[1];\n    const binary = atob(pureB64);\n    const bytes = new Uint8Array(binary.length);\n    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);\n    const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;\n    const page = await pdf.getPage(1);\n    const viewport = page.getViewport({ scale: 2.5 });\n    const canvas = document.createElement('canvas');\n    canvas.width = viewport.width; canvas.height = viewport.height;\n    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;\n    imageUrl = canvas.toDataURL('image/png');\n  }\n  const { data: { text } } = await Tesseract.recognize(imageUrl, 'fra', {\n    logger: m => { if (m.status==='recognizing text' && status) status.innerHTML = `<span class=\"ocr-spinner\"><\u002Fspan> OCR… ${Math.round(m.progress*100)}%`; }\n  });\n  return text;\n}\n\nfunction parseOCRText(text, mode) {\n  const lines = text.split('\\n').map(l => l.trim()).filter(l => l.length > 1);\n  const full = lines.join(' ');\n\n  // ── Extraction date ──\n  let date = '';\n  const dateM = full.match(/(\\d{1,2})[\\/\\-\\.](\\d{1,2})[\\/\\-\\.](\\d{2,4})/);\n  if (dateM) {\n    const y = dateM[3].length === 2 ? '20' + dateM[3] : dateM[3];\n    date = `${y}-${dateM[2].padStart(2,'0')}-${dateM[1].padStart(2,'0')}`;\n  }\n\n  // ── Extraction montant ──\n  const amtMatches = [...full.matchAll(/(\\d{1,6}[,\\.]\\d{2})\\s*€?/g)].map(m => parseFloat(m[1].replace(',','.')));\n  const montant = amtMatches.length ? Math.max(...amtMatches) : null;\n  const montantHT = amtMatches.length > 1 ? Math.min(...amtMatches.filter(a => a !== montant)) : null;\n  const tva = montant && montantHT ? Math.round((montant - montantHT) * 100) / 100 : null;\n\n  // ── Extraction période ──\n  const MOIS_FR = {janvier:'01',février:'02',fevrier:'02',mars:'03',avril:'04',mai:'05',juin:'06',juillet:'07',août:'08',aout:'08',septembre:'09',octobre:'10',novembre:'11',décembre:'12',decembre:'12'};\n  let periode = '';\n  const moisM = full.toLowerCase().match(/(janvier|f[ée]vrier|mars|avril|mai|juin|juillet|ao[uû]t|septembre|octobre|novembre|d[ée]cembre)\\s*(\\d{4})?/i);\n  if (moisM) {\n    const annee = moisM[2] || new Date().getFullYear();\n    periode = `${annee}-${MOIS_FR[moisM[1].toLowerCase()] || '01'}`;\n  } else if (date) {\n    periode = date.slice(0, 7);\n  }\n\n  // ── Extraction fournisseur (première ligne significative) ──\n  let fournisseur = '';\n  for (const line of lines) {\n    if (line.length > 3 && !/^\\d/.test(line) && !/^(date|facture|total|tva|ht|ttc|montant|quittance|loyer)/i.test(line)) {\n      fournisseur = line.replace(/[^a-zA-ZÀ-ÿ0-9\\s\\-\\.]/g, '').trim().slice(0, 40);\n      if (fournisseur.length > 2) break;\n    }\n  }\n\n  // ── Extraction locataire ──\n  let locataire = '';\n  const locM = full.match(/(?:locataire|preneur|titulaire)[:\\s]+([A-ZÀÂÄÉÈÊËÏÎÔÖÙÛÜ][a-zàâäéèêëïîôöùûü]+(?:\\s+[A-ZÀÂÄÉÈÊËÏÎÔÖÙÛÜ][a-zàâäéèêëïîôöùûü]+)*)/i);\n  if (locM) locataire = locM[1];\n\n  // ── Catégorie auto (comptes PCG BIC LMNP) ──\n  const txt = full.toLowerCase();\n  let categorie = '6288 - Autres charges diverses';\n  if (/assurance|garantie|mutuelle/.test(txt)) categorie = '6160 - Primes d assurance';\n  else if (/eau|compteur d.eau|consommation eau/.test(txt)) categorie = '6061 - Fournitures non stockables (eau, énergie)';\n  else if (/gaz|chauffage|engie|totalenergies/.test(txt)) categorie = '6061 - Fournitures non stockables (eau, énergie)';\n  else if (/electricit|électric|enedis|edf|courant/.test(txt)) categorie = '6061 - Fournitures non stockables (eau, énergie)';\n  else if (/téléphone|internet|sfr|orange|free|bouygues|fibre|mobile/.test(txt)) categorie = '6261 - Téléphonie et internet';\n  else if (/copropri|syndic|gardien/.test(txt)) categorie = '6132 - Charges de copropriété';\n  else if (/taxe fonci/.test(txt)) categorie = '6350 - Taxe foncière';\n  else if (/ordures|déchets|om\\b/.test(txt)) categorie = '6354 - Taxe ordures ménagères';\n  else if (/cfe|cotisation foncière/.test(txt)) categorie = '6351 - CFE';\n  else if (/intérêt|interest/.test(txt)) categorie = '6615 - Intérêts des emprunts';\n  else if (/frais bancaire|agios|commission bancaire/.test(txt)) categorie = '6270 - Frais bancaires';\n  else if (/expert.comptable|honoraire|comptable|juridique|avocat|notaire/.test(txt)) categorie = '6228 - Honoraires comptables et juridiques';\n  else if (/airbnb|booking|commission|courtage|agence/.test(txt)) categorie = '6226 - Commissions et courtages (Airbnb, agences)';\n  else if (/travaux|répar|entretien|plombier|électricien|maçon|peintur|carrel/.test(txt)) categorie = '6155 - Entretien et réparations immobiliers';\n  else if (/meuble|mobilier|canapé|literie|armoire|table|chaise/.test(txt)) categorie = '2184 - Mobilier';\n  else if (/agenc|aménag|cuisine|salle de bain/.test(txt)) categorie = '2181 - Agencements et aménagements';\n  else if (/ordinateur|imprimante|informatique|logiciel|matériel bureau/.test(txt)) categorie = '2183 - Matériel bureau et informatique';\n  else if (/fourniture|consommable|produit entretien|nettoyage/.test(txt)) categorie = '6063 - Fournitures entretien et petit équipement';\n  else if (/sous.traitance|prestataire|entreprise/.test(txt)) categorie = '6111 - Sous-traitance générale';\n\n  // ── Confiance ──\n  const confiance = montant && (fournisseur || locataire) ? 'haute' : montant || fournisseur ? 'moyenne' : 'faible';\n\n  if (mode === 'depense') {\n    return { date, fournisseur, montant_ttc: montant, montant_ht: montantHT, tva, description: lines.slice(0,3).join(' ').slice(0,60), categorie, confiance };\n  } else if (mode === 'loyer') {\n    const loyerM = full.match(/(?:loyer|mensualit)[^:]*[:\\s]+(\\d{1,6}[,\\.]\\d{2})/i);\n    const chargesM = full.match(/(?:charges|provision)[^:]*[:\\s]+(\\d{1,6}[,\\.]\\d{2})/i);\n    const loyer_hc = loyerM ? parseFloat(loyerM[1].replace(',','.')) : (amtMatches.length > 1 ? Math.min(...amtMatches) : null);\n    const charges = chargesM ? parseFloat(chargesM[1].replace(',','.')) : null;\n    return { periode, locataire, appartement: '', loyer_hc, charges, total: montant, confiance };\n  } else if (mode === 'emprunt') {\n    // ── Parser tableau d'amortissement bancaire français ──\n    // Stratégie 1 : chercher les libellés explicites\n    let capital = null, interets = null, assurance = null, mens = null, solde = null, banque = '';\n\n    // Banque\n    const banqueM = full.match(/(?:crédit\\s*agricole|bnp\\s*paribas?|société\\s*générale|caisse\\s*d.épargne|lcl|boursorama|hello\\s*bank|crédit\\s*mutuel|cic|banque\\s*populaire|bpce|la\\s*banque\\s*postale|ing\\b|hsbc|cetelem|sofinco|cofidis|ca\\s*consumer)/i);\n    banque = banqueM ? banqueM[0] : '';\n\n    // Chercher les libellés classiques\n    const pCapital = [\n      /capital\\s*(?:remboursé|amorti|restant\\s*du\\s*prêt|de\\s*l.échéance)[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /part\\s*(?:en\\s*)?capital[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /amortissement[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /principal[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n    ];\n    const pInterets = [\n      /intér[eê]ts?\\s*(?:du\\s*prêt|courus|payés|de\\s*l.échéance)?[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /int[eé]r[eê]ts?[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /frais\\s*financiers[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n    ];\n    const pAssurance = [\n      /assurance[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /(?:ADI|adi)[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /cotisation[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /prime[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n    ];\n    const pMens = [\n      /(?:mensualité|échéance|montant\\s*de\\s*l.échéance|total\\s*(?:à\\s*payer|échéance))[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /(?:prélèvement|débit)[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n    ];\n    const pSolde = [\n      /capital\\s*restant\\s*(?:dû|due?)[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n      /(?:solde|encours|capital\\s*dû)[^\\d]*([\\d\\s]+[,\\.]\\d{2})/i,\n    ];\n\n    for (const p of pCapital) { const m=full.match(p); if(m){capital=parseNum2(m[1]);break;} }\n    for (const p of pInterets) { const m=full.match(p); if(m){interets=parseNum2(m[1]);break;} }\n    for (const p of pAssurance) { const m=full.match(p); if(m){assurance=parseNum2(m[1]);break;} }\n    for (const p of pMens) { const m=full.match(p); if(m){mens=parseNum2(m[1]);break;} }\n    for (const p of pSolde) { const m=full.match(p); if(m){solde=parseNum2(m[1]);break;} }\n\n    // Stratégie 2 : si pas de libellés trouvés, analyser les lignes numériques\n    // Un tableau d'amort a typiquement N lignes avec 4-6 colonnes numériques\n    if (!capital && !interets) {\n      // Extraire toutes les lignes avec au moins 3 montants (ex: \"450,23  123,45  45,00  618,68\")\n      const numLines = lines.filter(l => {\n        const nums = l.match(/\\d+[,\\.]\\d{2}/g);\n        return nums && nums.length >= 3;\n      });\n\n      if (numLines.length > 0) {\n        // Prendre la première ligne de données (ignorer l'en-tête)\n        // Format typique colonne : [date?] [num?] [capital] [intérêts] [assurance] [total] [solde]\n        const firstLine = numLines[0];\n        const cols = (firstLine.match(/[\\d\\s]+[,\\.]\\d{2}/g) || [])\n          .map(s => parseNum2(s))\n          .filter(n => n > 0 && n < 100000);\n\n        if (cols.length >= 3) {\n          // Heuristique : trier pour identifier\n          // Capital = généralement le plus petit ou 2ème\n          // Intérêts = souvent le 2ème ou 3ème\n          // Assurance = souvent le plus petit\n          // Total = la somme des autres\n          const sorted = [...cols].sort((a,b)=>a-b);\n\n          // Trouver la mensualité = valeur qui ≈ somme des autres\n          let bestMens = null, bestCap = null, bestInt = null, bestAss = null;\n          for (let i=0; i<cols.length; i++) {\n            const rest = cols.filter((_,j)=>j!==i);\n            const sum = rest.reduce((s,v)=>s+v,0);\n            if (Math.abs(cols[i] - sum) < 1.0) {\n              bestMens = cols[i];\n              // Les autres sont capital, intérêts, assurance\n              const sub = rest.sort((a,b)=>b-a);\n              bestInt = sub[0];   // intérêts = plus grand des sous-composantes\n              bestCap = sub[1];   // capital = 2ème\n              bestAss = sub[2] || null; // assurance = plus petit (optionnel)\n              break;\n            }\n          }\n          if (bestMens) {\n            capital = bestCap;\n            interets = bestInt;\n            assurance = bestAss;\n            mens = bestMens;\n          } else {\n            // Fallback : assignation positionnelle\n            capital = cols[0];\n            interets = cols[1];\n            assurance = cols.length >= 3 ? cols[2] : null;\n            mens = cols[cols.length-1];\n          }\n        }\n      }\n    }\n\n    const confiance = (capital && interets) ? 'haute' : (capital || interets || mens) ? 'moyenne' : 'faible';\n    return {\n      periode,\n      banque,\n      capital: capital ? capital.toFixed(2) : '',\n      interets: interets ? interets.toFixed(2) : '',\n      assurance: assurance ? assurance.toFixed(2) : '',\n      mensualite: mens ? mens.toFixed(2) : '',\n      solde: solde ? solde.toFixed(2) : '',\n      confiance\n    };\n  } else {\n    return { periode, locataire, montant, description: lines.slice(0,2).join(' ').slice(0,60), confiance };\n  }\n}\n\nfunction renderOCRFields(data) {\n  const wrap = document.getElementById('ocr-fields-wrap');\n  const fieldsDiv = document.getElementById('ocr-fields');\n  const conf = data.confiance || 'moyenne';\n  const confEl = document.getElementById('ocr-conf');\n  confEl.textContent = conf === 'haute' ? '✅ Confiance haute' : conf === 'moyenne' ? '⚠️ Confiance moyenne' : '❌ Confiance faible';\n  confEl.className = 'ocr-confidence ' + (conf === 'haute' ? 'high' : conf === 'moyenne' ? 'med' : 'low');\n\n  let fieldsHTML = '';\n  if (ocrMode === 'depense') {\n    fieldsHTML = `\n      <div class=\"ocr-field\"><label>Date<\u002Flabel><input type=\"date\" id=\"ocrf-date\" value=\"${data.date||''}\" class=\"${data.date?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Fournisseur / Prestataire<\u002Flabel><input type=\"text\" id=\"ocrf-fourn\" value=\"${data.fournisseur||''}\" class=\"${data.fournisseur?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Montant TTC (€)<\u002Flabel><input type=\"number\" id=\"ocrf-amt\" value=\"${data.montant_ttc||''}\" step=\"0.01\" class=\"${data.montant_ttc?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Description / Commentaire<\u002Flabel><input type=\"text\" id=\"ocrf-desc\" value=\"${data.description||''}\" class=\"${data.description?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Catégorie suggérée<\u002Flabel>\n        <select id=\"ocrf-cat\"><option value=\"\">— Catégorie —<\u002Foption>${CATS.map(c=>`<option value=\"${c}\"${c===data.categorie?' selected':''}>${c}<\u002Foption>`).join('')}<\u002Fselect>\n      <\u002Fdiv>\n      ${data.montant_ht ? `<div style=\"font-size:12px;color:var(--muted);padding:4px 0\">HT : ${data.montant_ht} € · TVA : ${data.tva||'?'} €<\u002Fdiv>` : ''}`;\n  } else if (ocrMode === 'loyer') {\n    fieldsHTML = `\n      <div class=\"ocr-field\"><label>Période (mois)<\u002Flabel><input type=\"month\" id=\"ocrf-periode\" value=\"${data.periode||''}\" class=\"${data.periode?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Locataire<\u002Flabel><input type=\"text\" id=\"ocrf-loc\" value=\"${data.locataire||''}\" class=\"${data.locataire?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Appartement<\u002Flabel><input type=\"text\" id=\"ocrf-appt\" value=\"${data.appartement||''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Loyer HC (€)<\u002Flabel><input type=\"number\" id=\"ocrf-loy\" value=\"${data.loyer_hc||''}\" step=\"0.01\" class=\"${data.loyer_hc?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Charges (€)<\u002Flabel><input type=\"number\" id=\"ocrf-charges\" value=\"${data.charges||''}\" step=\"0.01\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Total (€)<\u002Flabel><input type=\"number\" id=\"ocrf-total\" value=\"${data.total||''}\" step=\"0.01\" class=\"${data.total?'ocr-filled':''}\"><\u002Fdiv>`;\n  } else if (ocrMode === 'emprunt') {\n    fieldsHTML = `\n      <div class=\"ocr-field\"><label>Période (mois)<\u002Flabel><input type=\"month\" id=\"ocrf-periode\" value=\"${data.periode||''}\" class=\"${data.periode?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Banque<\u002Flabel><input type=\"text\" id=\"ocrf-banque\" value=\"${data.banque||''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Capital remboursé (€)<\u002Flabel><input type=\"number\" id=\"ocrf-capital\" value=\"${data.capital||''}\" step=\"0.01\" class=\"${data.capital?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Intérêts (€)<\u002Flabel><input type=\"number\" id=\"ocrf-interets\" value=\"${data.interets||''}\" step=\"0.01\" class=\"${data.interets?'ocr-filled':''}\"><\u002Fdiv>\n      <div class=\"ocr-field\"><label>Assurance emprunteur (€)<\u002Flabel><input type=\"number\" id=\"ocrf-assurance\" value=\"${data.assurance||''}\" step=\"0.01\" class=\"${data.assurance?'ocr-filled':''}\"><\u002Fdiv>\n      ${data.mensualite ? `<div class=\"ocr-field\"><label>Mensualité totale (€)<\u002Flabel><input type=\"number\" id=\"ocrf-mens\" value=\"${data.mensualite}\" step=\"0.01\" class=\"ocr-filled\" readonly style=\"color:var(--blue)\"><\u002Fdiv>` : ''}\n      ${data.solde ? `<div class=\"ocr-field\"><label>Capital restant dû (€)<\u002Flabel><input type=\"number\" value=\"${data.solde}\" step=\"0.01\" readonly style=\"color:var(--muted)\"><\u002Fdiv>` : ''}`;\n  } else {\n  }\n  fieldsDiv.innerHTML = fieldsHTML;\n  wrap.style.display = 'block';\n  document.getElementById('ocr-confirm-btn').style.display = 'inline-flex';\n}\n\nfunction confirmOCR() {\n  const pj = ocrFileData ? [ocrFileData] : [];\n  if (ocrMode === 'depense') {\n    const date = document.getElementById('ocrf-date')?.value || '';\n    const fourn = document.getElementById('ocrf-fourn')?.value || '';\n    const cat = document.getElementById('ocrf-cat')?.value || '';\n    const desc = document.getElementById('ocrf-desc')?.value || '';\n    const amt = document.getElementById('ocrf-amt')?.value || '';\n    addDepRow(ocrTargetTable, date, fourn, cat, desc, amt, pj);\n  } else if (ocrMode === 'loyer') {\n    const periode = document.getElementById('ocrf-periode')?.value || '';\n    const loc = document.getElementById('ocrf-loc')?.value || '';\n    const appt = document.getElementById('ocrf-appt')?.value || '';\n    const total = document.getElementById('ocrf-total')?.value || document.getElementById('ocrf-loy')?.value || '';\n    const charges = document.getElementById('ocrf-charges')?.value || '';\n    addLoyRow(periode, loc, appt, '', total, pj);\n    // Si charges → ajouter ligne provision\n    if (charges && parseFloat(charges) > 0) addPrvRow(periode, loc, appt, 'Provisions charges', charges, []);\n  } else if (ocrMode === 'emprunt') {\n    const periode = document.getElementById('ocrf-periode')?.value || '';\n    const capital = document.getElementById('ocrf-capital')?.value || '';\n    const interets = document.getElementById('ocrf-interets')?.value || '';\n    const assurance = document.getElementById('ocrf-assurance')?.value || '';\n    addEchRow(ocrTargetTable, periode, capital, interets, assurance);\n  } else {\n    const periode = document.getElementById('ocrf-periode')?.value || '';\n    const loc = document.getElementById('ocrf-loc')?.value || '';\n    const amt = document.getElementById('ocrf-amt')?.value || '';\n    const desc = document.getElementById('ocrf-desc')?.value || '';\n    addPrvRow(periode, loc, '', desc, amt, pj);\n  }\n  recalc();\n  saveData();\n  closeOCR();\n}\n\n// ══ TRAITEMENT EN LOT (BATCH) ══\nasync function batchProcess(files, mode, tableId, batchId) {\n  if (!files || !files.length) return;\n  const fileArr = Array.from(files);\n\n  // Afficher la file d'attente\n  const queue = document.getElementById(batchId + '-queue');\n  const itemsEl = document.getElementById(batchId + '-items');\n  queue.style.display = 'block';\n  itemsEl.innerHTML = '';\n\n  // Créer les items de la file\n  const items = fileArr.map((file, i) => {\n    const icon = file.type.startsWith('image') ? '🖼️' : '📄';\n    const div = document.createElement('div');\n    div.className = 'batch-item';\n    div.id = `${batchId}-item-${i}`;\n    div.innerHTML = `\n      <span class=\"batch-item-icon\">${icon}<\u002Fspan>\n      <span class=\"batch-item-name\">${file.name}<\u002Fspan>\n      <span class=\"batch-progress\" id=\"${batchId}-prog-${i}\"><\u002Fspan>\n      <span class=\"batch-item-status wait\" id=\"${batchId}-status-${i}\">En attente<\u002Fspan>`;\n    itemsEl.appendChild(div);\n    return div;\n  });\n\n  // Traiter les fichiers séquentiellement\n  let doneCount = 0;\n  for (let i = 0; i < fileArr.length; i++) {\n    const file = fileArr[i];\n    const statusEl = document.getElementById(`${batchId}-status-${i}`);\n    const progEl = document.getElementById(`${batchId}-prog-${i}`);\n\n    // Passer en \"en cours\"\n    statusEl.className = 'batch-item-status running';\n    statusEl.textContent = 'OCR…';\n\n    try {\n      // Lire le fichier\n      const b64 = await new Promise(res => {\n        const r = new FileReader();\n        r.onload = e => res(e.target.result);\n        r.readAsDataURL(file);\n      });\n\n      let imageUrl = b64;\n      let text = '';\n\n      // PDF : essayer d'abord l'extraction texte directe (PDFs vectoriels)\n      if (file.type === 'application/pdf') {\n        statusEl.textContent = 'Extraction PDF…';\n        const pureB64 = b64.split(',')[1];\n        const binary = atob(pureB64);\n        const bytes = new Uint8Array(binary.length);\n        for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);\n        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;\n        for (let p = 1; p <= pdf.numPages; p++) {\n          const page = await pdf.getPage(p);\n          const content = await page.getTextContent();\n          let lastY = null;\n          content.items.forEach(item => {\n            if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) text += '\\n';\n            text += item.str + ' ';\n            lastY = item.transform[5];\n          });\n          text += '\\n';\n        }\n        // Fallback Tesseract si pas de texte extractible\n        if (text.replace(/\\s/g,'').length < 50) {\n          statusEl.textContent = 'OCR image…';\n          text = await runTesseract(b64, file.type, null);\n        }\n      } else {\n        // Image : Tesseract directement\n        text = await runTesseract(b64, file.type, statusEl);\n      }\n\n      // Parser et injecter la ligne\n      const parsed = parseOCRText(text, mode);\n\n      if (mode === 'depense') {\n        addDepRow(tableId, parsed.date||'', parsed.fournisseur||'', parsed.categorie||'', parsed.description||'', parsed.montant_ttc||'', [ocrFileData]);\n      } else if (mode === 'loyer') {\n        addLoyRow(parsed.periode||'', parsed.locataire||'', parsed.appartement||'', '', parsed.total||parsed.loyer_hc||'', [ocrFileData]);\n        if (parsed.charges && parseFloat(parsed.charges) > 0) {\n          addPrvRow(parsed.periode||'', parsed.locataire||'', '', 'Provisions charges', parsed.charges, []);\n        }\n      } else if (mode === 'emprunt') {\n        addEchRow(tableId, parsed.periode||'', parsed.capital||'', parsed.interets||'', parsed.assurance||'');\n      } else {\n        addPrvRow(parsed.periode||'', parsed.locataire||'', '', parsed.description||'', parsed.montant||'', [ocrFileData]);\n      }\n\n      recalc();\n      doneCount++;\n      statusEl.className = 'batch-item-status done';\n      statusEl.textContent = '✅ Ajouté';\n      progEl.textContent = '';\n\n    } catch(e) {\n      console.error('Batch OCR error:', e);\n      statusEl.className = 'batch-item-status err';\n      statusEl.textContent = '❌ ' + (e.message || 'Erreur inconnue');\n    }\n  }\n\n  // Résumé final\n  saveData();\n  const summary = document.createElement('div');\n  summary.style.cssText = 'font-size:12px;font-weight:600;color:var(--green);padding:8px 12px;margin-top:4px';\n  summary.textContent = `✅ ${doneCount}/${fileArr.length} document(s) traité(s) et ajouté(s)`;\n  itemsEl.appendChild(summary);\n\n  // Réinitialiser l'input file pour permettre un nouveau dépôt\n  const inp = document.getElementById(batchId + '-input');\n  if (inp) inp.value = '';\n}\n\n// ══ EMPRUNTS PAR BIEN ══\nfunction addEchRow(tbId, mois='', capital='', interets='', assurance='') {\n  const tb = document.getElementById(tbId);\n  const tr = document.createElement('tr');\n  tr.dataset.pj = '[]';\n  const tot = (parseFloat(capital)||0)+(parseFloat(interets)||0)+(parseFloat(assurance)||0);\n  tr.innerHTML = `\n    <td><input type=\"month\" value=\"${mois}\" style=\"width:120px\" onchange=\"updateEchTot(this)\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${capital}\" style=\"text-align:right;width:90px;color:var(--blue)\" onchange=\"updateEchTot(this)\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${interets}\" style=\"text-align:right;width:90px;color:var(--red)\" onchange=\"updateEchTot(this)\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${assurance}\" style=\"text-align:right;width:90px;color:var(--gold)\" onchange=\"updateEchTot(this)\"><\u002Ftd>\n    <td class=\"mono\" style=\"font-weight:700\">${tot>0?fmt(tot):'—'}<\u002Ftd>\n    <td><div class=\"pj-cell\"><label class=\"pj-btn\">📎 <input type=\"file\" accept=\"image/*,.pdf\" multiple style=\"display:none\" onchange=\"addPJFiles(this)\"> Joindre<\u002Flabel><\u002Fdiv><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n}\n\nfunction updateEchTot(inp) {\n  const tr = inp.closest('tr');\n  const nums = tr.querySelectorAll('input[type=\"number\"]');\n  const tot = Array.from(nums).reduce((s,i)=>s+(parseFloat(i.value)||0),0);\n  tr.cells[4].textContent = tot>0?fmt(tot):'—';\n  recalc();\n}\n\n// ── TABLEAU D'AMORTISSEMENT ──\nlet amortViewV = 'annuel', amortViewF = 'annuel';\n\nfunction toggleAmort(bien) {\n  const w = document.getElementById(`${bien}-amort-wrap`);\n  w.style.display = w.style.display==='none' ? 'block' : 'none';\n  if (w.style.display==='block') calcAmort(bien);\n}\n\nfunction setAmortView(bien, view) {\n  if (bien==='v') amortViewV=view; else amortViewF=view;\n  const an = document.getElementById(`${bien}-btn-an`);\n  const men = document.getElementById(`${bien}-btn-men`);\n  an.style.background = view==='annuel'?'var(--blue)':'transparent';\n  an.style.color = view==='annuel'?'#fff':'var(--muted)';\n  an.style.borderColor = view==='annuel'?'var(--blue)':'var(--border)';\n  men.style.background = view==='mensuel'?'var(--blue)':'transparent';\n  men.style.color = view==='mensuel'?'#fff':'var(--muted)';\n  men.style.borderColor = view==='mensuel'?'var(--blue)':'var(--border)';\n  calcAmort(bien);\n}\n\nfunction calcAmort(bien) {\n  const capital = parseFloat(document.getElementById(`${bien}-emp-capital`)?.value)||0;\n  const tauxAn = parseFloat(document.getElementById(`${bien}-emp-taux`)?.value)||0;\n  const duree = parseInt(document.getElementById(`${bien}-emp-duree`)?.value)||0;\n  const mensHorsAss = parseFloat(document.getElementById(`${bien}-emp-mens`)?.value)||0;\n  const assurance = parseFloat(document.getElementById(`${bien}-emp-ass`)?.value)||0;\n  const tbody = document.getElementById(`${bien}-amort-tbody`);\n  const view = bien==='v' ? amortViewV : amortViewF;\n\n  if (!capital || !duree || (!tauxAn && !mensHorsAss)) {\n    tbody.innerHTML = `<tr><td colspan=\"6\" style=\"padding:16px;text-align:center;color:var(--muted)\">Renseignez le capital, la durée et le taux (ou la mensualité) pour calculer le tableau.<\u002Ftd><\u002Ftr>`;\n    return;\n  }\n\n  const tauxMens = tauxAn / 100 / 12;\n  // Mensualité calculée si pas saisie\n  let mens = mensHorsAss;\n  if (!mens && tauxMens > 0) {\n    mens = capital * tauxMens / (1 - Math.pow(1+tauxMens, -duree));\n  } else if (!mens) {\n    mens = capital / duree;\n  }\n\n  // Générer toutes les lignes mensuelles\n  let solde = capital;\n  const lignes = [];\n  for (let i=1; i<=duree && solde>0.01; i++) {\n    const int = tauxMens>0 ? solde*tauxMens : 0;\n    const cap = Math.min(mens-int, solde);\n    solde = Math.max(solde-cap, 0);\n    lignes.push({ mois:i, cap, int, ass:assurance, mens:cap+int+assurance, solde });\n  }\n\n  tbody.innerHTML = '';\n\n  if (view==='mensuel') {\n    lignes.forEach(l => {\n      const tr = document.createElement('tr');\n      tr.innerHTML = `<td>Mois ${l.mois}<\u002Ftd><td class=\"mono\">${fmt(l.cap)}<\u002Ftd><td class=\"mono-red\">${fmt(l.int)}<\u002Ftd><td class=\"mono\" style=\"color:var(--gold)\">${fmt(l.ass)}<\u002Ftd><td class=\"mono\" style=\"font-weight:600\">${fmt(l.mens)}<\u002Ftd><td class=\"mono\" style=\"color:var(--muted)\">${fmt(l.solde)}<\u002Ftd>`;\n      tbody.appendChild(tr);\n    });\n  } else {\n    // Grouper par année\n    for (let an=1; an<=Math.ceil(duree/12); an++) {\n      const debut=(an-1)*12, fin=Math.min(an*12, lignes.length);\n      const slice=lignes.slice(debut,fin);\n      if (!slice.length) break;\n      const totCap=slice.reduce((s,l)=>s+l.cap,0);\n      const totInt=slice.reduce((s,l)=>s+l.int,0);\n      const totAss=slice.reduce((s,l)=>s+l.ass,0);\n      const totMens=slice.reduce((s,l)=>s+l.mens,0);\n      const soldeFin=slice[slice.length-1].solde;\n      const tr = document.createElement('tr');\n      tr.innerHTML = `<td style=\"font-weight:600\">Année ${an}<\u002Ftd><td class=\"mono\">${fmt(totCap)}<\u002Ftd><td class=\"mono-red\">${fmt(totInt)}<\u002Ftd><td class=\"mono\" style=\"color:var(--gold)\">${fmt(totAss)}<\u002Ftd><td class=\"mono\" style=\"font-weight:600\">${fmt(totMens)}<\u002Ftd><td class=\"mono\" style=\"color:var(--muted)\">${fmt(soldeFin)}<\u002Ftd>`;\n      tbody.appendChild(tr);\n    }\n  }\n}\n\nfunction calcAmortV() { const w=document.getElementById('v-amort-wrap'); if(w.style.display!=='none') calcAmort('v'); recalc(); }\nfunction calcAmortF() { const w=document.getElementById('f-amort-wrap'); if(w.style.display!=='none') calcAmort('f'); recalc(); }\n\n// ══ INIT ══\n\nfunction addEmprunt() {\n  const id = Date.now();\n  emprunts.push({ id, nom: '', bien: '', banque: '', capital_initial: '', taux: '', duree: '', mensualite: '', assurance_mens: '' });\n  renderEmprunts();\n}\n\nfunction removeEmprunt(id) {\n  emprunts = emprunts.filter(e => e.id !== id);\n  render
