document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Figtree';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"10d60532-b954-42ba-b3a7-a139ef6f430f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"b9d3f960-976b-41f0-af4f-a506d0fd24ae\"><\u002Fscript>\n<script src=\"bdbd20ae-6fdc-4e5d-ae5e-c61253abaca0\"><\u002Fscript>\n<script src=\"163c20d6-957a-45cb-ad00-3a507a4a7ff6\"><\u002Fscript>\n<style>\n:root {\n  --bg:#faf3e6; --surface:#fffdf8; --surface2:#f1e5cf; --border:#e2d3b4;\n  --green:#5e7548; --red:#b6432f; --blue:#b2622d; --gold:#a97a2e;\n  --text:#201e1d; --muted:#82796a; --dim:#c0b6a5;\n  --vitry:#b2622d; --fer:#56633f; --gen:#8a6a52;\n  --radius-sm:8px; --radius-md:16px; --radius-lg:28px;\n  --shadow-sm:0 1px 2px rgba(46,43,37,.14); --shadow-md:0 3px 10px rgba(46,43,37,.16); --shadow-lg:0 12px 32px rgba(46,43,37,.22);\n}\n*{margin:0;padding:0;box-sizing:border-box}\nbody{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;font-size:14px;min-height:100vh}\n\n/* LOCK */\n#lock-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}\n.lock-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px 44px 40px;width:380px;box-shadow:var(--shadow-lg);text-align:center}\n.lock-card h2{font-family:'Caprasimo',serif;font-weight:400;font-size:24px;margin-bottom:6px}\n.lock-card p{font-size:13px;color:var(--muted);margin-bottom:28px}\n.lock-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Figtree',sans-serif;font-size:15px;background:var(--bg);outline:none;text-align:center;letter-spacing:3px;transition:all .2s;margin-bottom:16px}\n.lock-input:focus{border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(178,98,45,.15)}\n.lock-input.shake{animation:shake .4s ease;border-color:var(--red)}\n.lock-btn{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:999px;font-family:'Figtree',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}\n.lock-btn:hover{background:#8c491a}\n.lock-err{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}\n@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}\n\n/* HEADER */\n.header{padding:32px 40px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;background:linear-gradient(180deg,#f1e5cf 0%,transparent 100%);position:relative}\n.header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--vitry),var(--fer),var(--gen))}\n.header h1{font-family:'Caprasimo',serif;font-weight:400;font-size:30px}\n.header h1 span{color:var(--gold);font-style:normal}\n.header p{color:var(--muted);font-size:12px;margin-top:4px}\n.year-pill{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);border:1px solid var(--border);padding:5px 14px;border-radius:999px;background:var(--surface)}\n\n/* NAV */\n.nav{display:flex;gap:6px;padding:14px 40px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}\n.nav-btn{padding:9px 20px;border-radius:999px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;transition:all .15s;display:flex;align-items:center;gap:8px;white-space:nowrap;user-select:none}\n.nav-btn:hover{background:var(--surface2);color:var(--text)}\n.nav-btn.active{background:#fff2eb;color:var(--text);border-color:var(--border);box-shadow:var(--shadow-sm)}\n.dot{width:8px;height:8px;border-radius:50%;display:inline-block}\n\n/* TOOLBAR */\n.toolbar{display:flex;align-items:center;gap:8px;padding:10px 40px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}\n.tbtn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}\n.tbtn:hover{color:var(--text);border-color:var(--dim)}\n.tbtn.danger:hover{color:var(--red);border-color:var(--red)}\n.tsep{width:1px;height:16px;background:var(--border);margin:0 4px}\n\n/* MAIN */\n.main{padding:28px 40px;max-width:1400px}\n.welcome-guide{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 22px;margin-bottom:22px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)}\n.welcome-guide .wg-icon{font-size:26px;flex-shrink:0}\n.welcome-guide .wg-text{font-size:13px;color:var(--text);line-height:1.6}\n.welcome-guide .wg-text strong{color:var(--blue)}\n.welcome-guide .wg-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px}\n.tab-panel{display:none}.tab-panel.active{display:block}\n\n/* BANNER */\n.banner{border-radius:var(--radius-md);padding:16px 22px;margin-bottom:22px;display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;border:1px solid;position:relative;overflow:hidden}\n.banner::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px}\n.banner.neutral{background:rgba(178,98,45,.07);border-color:rgba(178,98,45,.2);color:var(--blue)}.banner.neutral::before{background:var(--blue)}\n.banner.positive{background:rgba(94,117,72,.08);border-color:rgba(94,117,72,.2);color:var(--green)}.banner.positive::before{background:var(--green)}\n.banner.negative{background:rgba(182,67,47,.07);border-color:rgba(182,67,47,.2);color:var(--red)}.banner.negative::before{background:var(--red)}\n\n/* KPI */\n.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}\n.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px 20px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}\n.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:8px}\n.kpi-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;letter-spacing:-1px}\n.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}\n.kpi.green .kpi-val{color:var(--green)}.kpi.red .kpi-val{color:var(--red)}.kpi.blue .kpi-val{color:var(--blue)}.kpi.gold .kpi-val{color:var(--gold)}\n.kpi-accent{position:absolute;top:0;right:0;width:50px;height:50px;border-radius:0 10px 0 50px;opacity:.1}\n.kpi.green .kpi-accent{background:var(--green)}.kpi.red .kpi-accent{background:var(--red)}.kpi.blue .kpi-accent{background:var(--blue)}.kpi.gold .kpi-accent{background:var(--gold)}\n\n/* SECTION */\n.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow-sm)}\n.sec-head{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2)}\n.sec-head h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px}\n.sec-total{font-family:'DM Mono',monospace;font-size:15px;font-weight:600}\n.sec-total.red{color:var(--red)}.sec-total.green{color:var(--green)}\n.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}\n.badge-red{background:rgba(232,41,74,.12);color:var(--red)}\n.badge-green{background:rgba(0,169,110,.12);color:var(--green)}\n.badge-blue{background:rgba(80,70,228,.12);color:var(--blue)}\n\n/* TABLE */\n.dt{width:100%;border-collapse:collapse}\n.dt thead th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);border-bottom:1px solid var(--border);background:var(--surface2)}\n.dt tbody td{padding:11px 16px;border-bottom:1px solid rgba(221,224,232,.5);font-size:13px}\n.dt tbody tr:last-child td{border-bottom:none}\n.dt tbody tr:hover{background:rgba(0,0,0,.015)}\n.dt input,.dt select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Figtree',sans-serif;font-size:13px;padding:4px 8px;border-radius:6px;width:100%;outline:none;transition:all .2s}\n.readonly-zone input:disabled,.readonly-zone select:disabled,.readonly-zone input[disabled],.readonly-zone select[disabled]{background:transparent;border-color:transparent;color:var(--text);cursor:default;opacity:1}\n.readonly-zone .client-note{background:rgba(0,169,110,.06);border-color:rgba(0,169,110,.3);color:var(--text);cursor:text}\n.zone-unlockbar{display:inline-flex;align-items:center}\n\n/* IMMOBILISATIONS — présentation groupée et colorée */\n.immo-grp-row th{padding:6px 16px!important;font-size:9px!important;letter-spacing:1px!important;text-transform:uppercase;border-bottom:none!important}\n.immo-grp{text-align:left}\n.immo-grp.identification{background:rgba(80,70,228,.09)!important;color:var(--blue)!important}\n.immo-grp.amortissement{background:rgba(217,119,6,.09)!important;color:var(--gold)!important}\n.immo-grp.suivi{background:rgba(0,169,110,.09)!important;color:var(--green)!important}\n.compte-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}\n.compte-tag.terrain{background:rgba(121,85,72,.12);color:#795548}\n.compte-tag.construction{background:rgba(80,70,228,.12);color:var(--blue)}\n.compte-tag.mobilier{background:rgba(217,119,6,.12);color:var(--gold)}\n.vnc-val.pos{color:var(--blue);font-weight:700}\n.vnc-val.zero{color:var(--dim);font-weight:600}\n\n/* Badges de compte réutilisés partout (journal, balance, catégories) */\n.compte-tag.charge{background:rgba(232,41,74,.10);color:var(--red)}\n.compte-tag.produit{background:rgba(0,169,110,.10);color:var(--green)}\n.compte-tag.immo{background:rgba(80,70,228,.10);color:var(--blue)}\n.compte-tag.capital{background:rgba(121,85,72,.10);color:#795548}\n.compte-tag.autre{background:var(--surface2);color:var(--muted)}\n\n/* En-têtes groupés génériques (Journal, Balance…) — même langage visuel que les Immobilisations */\n.grp-row th{padding:6px 16px!important;font-size:9px!important;letter-spacing:1px!important;text-transform:uppercase;border-bottom:none!important;text-align:left}\n.thgrp-blue{background:rgba(80,70,228,.09)!important;color:var(--blue)!important}\n.thgrp-gold{background:rgba(217,119,6,.09)!important;color:var(--gold)!important}\n.thgrp-green{background:rgba(0,169,110,.09)!important;color:var(--green)!important}\n.thgrp-red{background:rgba(232,41,74,.09)!important;color:var(--red)!important}\n.dt input:focus,.dt select:focus{background:#fff;border-color:var(--blue);box-shadow:0 0 0 2px rgba(80,70,228,.1)}\n.dt select option{background:#fff}\n.mono{font-family:'DM Mono',monospace;text-align:right}\n.mono-red{font-family:'DM Mono',monospace;text-align:right;color:var(--red);font-weight:600}\n.mono-green{font-family:'DM Mono',monospace;text-align:right;color:var(--green);font-weight:600}\n.mono-blue{font-family:'DM Mono',monospace;text-align:right;color:var(--blue)}\n\n/* BUTTONS */\n.btn-add{margin:10px 16px;padding:7px 14px;background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:999px;cursor:pointer;font-family:'Figtree',sans-serif;font-size:12px;transition:all .15s;display:flex;align-items:center;gap:5px}\n.btn-add:hover{border-color:var(--dim);color:var(--text);background:rgba(0,0,0,.02)}\n.btn-del{background:none;border:none;color:var(--dim);cursor:pointer;padding:3px 6px;border-radius:4px;font-size:13px}\n.btn-del:hover{color:var(--red);background:rgba(232,41,74,.08)}\n\n/* TWO COL */\n.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}\n@media(max-width:800px){.two-col{grid-template-columns:1fr}}\n\n/* CHARTS */\n.chart-box{padding:20px;height:240px;display:flex;align-items:center;justify-content:center}\n\n/* SYNTHESE MATRIX */\n.syn-matrix{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px}\n.sm{background:#fff;padding:16px 18px}\n.sm.hrow{background:var(--surface2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}\n.sm.vc{border-top:2px solid var(--vitry)}.sm.fc{border-top:2px solid var(--fer)}.sm.gc{border-top:2px solid var(--gen)}\n.sm .sv{font-family:'DM Mono',monospace;font-size:17px;font-weight:500}\n.sm .sv.red{color:var(--red)}.sm .sv.green{color:var(--green)}.sm .sv.blue{color:var(--blue)}\n\n/* CAT BARS */\n.cat-bar{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(221,224,232,.4)}\n.cat-bar:last-child{border-bottom:none}\n.cb-lbl{width:180px;font-size:12px;color:var(--muted);flex-shrink:0}\n.cb-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}\n.cb-fill{height:100%;border-radius:3px;transition:width .5s ease}\n.cb-amt{width:90px;text-align:right;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);flex-shrink:0}\n\n/* EMPTY */\n.empty{text-align:center;padding:40px 20px;color:var(--dim)}\n.empty-icon{font-size:36px;margin-bottom:10px}\n\n/* MODE BADGE */\n.mode-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px}\n.mode-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700}\n.mb-long{background:rgba(80,70,228,.1);color:var(--vitry);border:1px solid rgba(80,70,228,.25)}\n.mb-air{background:rgba(232,41,74,.08);color:var(--red);border:1px solid rgba(232,41,74,.2)}\n.mb-compta{background:rgba(14,165,233,.1);color:#0ea5e9;border:1px solid rgba(14,165,233,.25)}\n\n/* IMPORT ZONE */\n.import-zone{border:2px dashed var(--border);border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc;margin-bottom:18px}\n.import-zone:hover,.import-zone.drag-over{border-color:var(--blue);background:rgba(80,70,228,.03)}\n.import-zone .iz-icon{font-size:32px;margin-bottom:8px}\n.import-zone .iz-title{font-weight:700;font-size:14px;margin-bottom:4px}\n.import-zone .iz-sub{font-size:12px;color:var(--muted);margin-bottom:12px}\n.import-zone .iz-btn{display:inline-block;padding:7px 18px;background:var(--blue);color:#fff;border-radius:7px;font-size:12px;font-weight:600}\n.imp-status{padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:8px}\n.imp-status.ok{background:rgba(0,169,110,.07);color:var(--green);border:1px solid rgba(0,169,110,.2)}\n.imp-status.err{background:rgba(232,41,74,.07);color:var(--red);border:1px solid rgba(232,41,74,.2)}\n.imp-status.loading{background:rgba(80,70,228,.07);color:var(--blue);border:1px solid rgba(80,70,228,.2)}\n\n/* COMPTA */\n.comptes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;padding:16px 20px}\n.cr{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:7px;border:1px solid var(--border)}\n.cr label{font-size:11px;color:var(--muted);width:160px;flex-shrink:0}\n.cr .cn{width:66px;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--blue);background:transparent;border:1px solid transparent;border-radius:4px;padding:2px 5px;outline:none;transition:all .2s}\n.cr .cn:focus{background:#fff;border-color:var(--blue)}\n.cr .cl{flex:1;font-size:12px;background:transparent;border:1px solid transparent;border-radius:4px;padding:2px 5px;outline:none;transition:all .2s}\n.cr .cl:focus{background:#fff;border-color:var(--border)}\n.export-btns{display:flex;gap:12px;flex-wrap:wrap;padding:18px 20px}\n.ebtn{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;font-family:'Figtree',sans-serif;transition:all .15s;text-align:left;min-width:180px}\n.ebtn:hover{border-color:var(--blue);background:rgba(178,98,45,.06)}\n.ebtn-title{font-weight:700;font-size:13px}\n.ebtn-sub{font-size:11px;color:var(--muted);margin-top:2px}\n\n/* TOAST */\n#toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--green);color:var(--green);box-shadow:var(--shadow-md);font-family:'Figtree',sans-serif;font-size:13px;font-weight:500;padding:10px 18px;border-radius:8px;display:flex;align-items:center;gap:7px;opacity:0;transform:translateY(10px);transition:all .3s;z-index:9998;pointer-events:none}\n#toast.show{opacity:1;transform:translateY(0)}\n\n/* SCROLLBAR */\n::-webkit-scrollbar{width:5px;height:5px}\n::-webkit-scrollbar-track{background:var(--surface2)}\n::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}\n\n/* ANALYSE SIMPLE */\n.analyse-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 28px;margin-bottom:22px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}\n.analyse-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--vitry),var(--fer),var(--gen))}\n.analyse-title{font-family:'Caprasimo',serif;font-weight:400;font-size:19px;margin-bottom:16px;color:var(--text);display:flex;align-items:center;gap:10px}\n.analyse-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}\n.analyse-bloc{background:var(--surface2);border-radius:10px;padding:14px 16px;border-left:3px solid var(--border)}\n.analyse-bloc.ok{border-left-color:var(--green)}\n.analyse-bloc.warn{border-left-color:var(--gold)}\n.analyse-bloc.bad{border-left-color:var(--red)}\n.analyse-bloc .ab-icon{font-size:20px;margin-bottom:6px}\n.analyse-bloc .ab-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px}\n.analyse-bloc .ab-text{font-size:13px;color:var(--text);line-height:1.5}\n.analyse-conseil{background:rgba(80,70,228,.06);border:1px solid rgba(80,70,228,.15);border-radius:8px;padding:14px 16px;font-size:13px;color:var(--text);line-height:1.6;margin-top:12px}\n.analyse-conseil strong{color:var(--blue)}\n\n/* EMPRUNTS */\n.emprunt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;padding:18px 20px}\n.emprunt-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative}\n.emprunt-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}\n.emprunt-card-head h4{font-size:13px;font-weight:700;color:var(--text)}\n.emprunt-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}\n.ef{display:flex;flex-direction:column;gap:3px}\n.ef label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}\n.ef input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Figtree',sans-serif;font-size:13px;background:#fff;outline:none;transition:all .2s}\n.ef input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(80,70,228,.1)}\n.ef.full{grid-column:1/-1}\n.emprunt-total{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted)}\n.emprunt-total span{font-family:'DM Mono',monospace;font-weight:700;font-size:14px;color:var(--red)}\n.batch-zone{border:2px dashed var(--border);border-radius:10px;padding:20px 24px;margin:12px 16px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;background:#fafbfc}\n.batch-zone:hover,.batch-zone.drag-over{border-color:var(--blue);background:rgba(80,70,228,.03)}\n.batch-zone-icon{font-size:28px;flex-shrink:0}\n.batch-zone-text{flex:1}\n.batch-zone-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px}\n.batch-zone-sub{font-size:11px;color:var(--muted)}\n.batch-zone-btn{padding:6px 14px;background:var(--blue);color:#fff;border:none;border-radius:999px;font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}\n.batch-queue{padding:0 16px 12px;display:none}\n.batch-queue-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:8px}\n.batch-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:6px;font-size:12px}\n.batch-item-icon{font-size:16px;flex-shrink:0}\n.batch-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}\n.batch-item-status{font-size:11px;font-weight:600;white-space:nowrap;padding:2px 8px;border-radius:4px}\n.batch-item-status.wait{background:rgba(107,110,130,.1);color:var(--muted)}\n.batch-item-status.running{background:rgba(80,70,228,.1);color:var(--blue)}\n.batch-item-status.done{background:rgba(0,169,110,.1);color:var(--green)}\n.batch-item-status.err{background:rgba(232,41,74,.1);color:var(--red)}\n.batch-progress{flex-shrink:0;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}\n.batch-recettes-zone{border-color:var(--green)}\n.batch-recettes-zone:hover,.batch-recettes-zone.drag-over{border-color:var(--green);background:rgba(0,169,110,.03)}\n\n/* PIÈCES JOINTES */\n.pj-btn{background:none;border:1px dashed var(--border);color:var(--muted);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}\n.pj-btn:hover{border-color:var(--blue);color:var(--blue)}\n.pj-thumb{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;margin:1px;transition:all .15s}\n.pj-thumb:hover{border-color:var(--red);color:var(--red)}\n.pj-cell{display:flex;flex-wrap:wrap;align-items:center;gap:4px;min-width:120px}\n\n/* OCR */\n.ocr-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:linear-gradient(135deg,#c67139,#a97a2e);color:#fff;border:none;border-radius:999px;font-family:'Figtree',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}\n.ocr-btn:hover{opacity:.88;transform:translateY(-1px)}\n.ocr-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}\n#ocr-modal{display:none;position:fixed;inset:0;z-index:9995;background:rgba(0,0,0,.6);align-items:center;justify-content:center}\n#ocr-modal.open{display:flex}\n#ocr-inner{background:var(--surface);border-radius:var(--radius-lg);padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2)}\n#ocr-inner h3{font-family:'Caprasimo',serif;font-size:20px;margin-bottom:6px}\n#ocr-inner p{font-size:13px;color:var(--muted);margin-bottom:20px}\n.ocr-preview{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:18px;max-height:200px;display:flex;align-items:center;justify-content:center;background:var(--surface2)}\n.ocr-preview img{max-width:100%;max-height:200px;object-fit:contain}\n.ocr-fields{display:grid;gap:10px;margin-bottom:20px}\n.ocr-field{display:flex;flex-direction:column;gap:4px}\n.ocr-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}\n.ocr-field input,.ocr-field select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'Figtree',sans-serif;font-size:13px;color:var(--text);background:#fff;outline:none;transition:all .2s}\n.ocr-field input:focus,.ocr-field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(80,70,228,.1)}\n.ocr-field input.ocr-filled{border-color:var(--green);background:rgba(0,169,110,.04)}\n.ocr-actions{display:flex;gap:10px;justify-content:flex-end}\n.ocr-confirm{padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:999px;font-family:'Figtree',sans-serif;font-size:13px;font-weight:600;cursor:pointer}\n.ocr-confirm:hover{background:#8c491a}\n.ocr-cancel{padding:10px 22px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:999px;font-family:'Figtree',sans-serif;font-size:13px;cursor:pointer}\n.ocr-cancel:hover{border-color:var(--red);color:var(--red)}\n.ocr-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}\n@keyframes spin{to{transform:rotate(360deg)}}\n.ocr-confidence{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600}\n.ocr-confidence.high{background:rgba(0,169,110,.12);color:var(--green)}\n.ocr-confidence.med{background:rgba(217,119,6,.12);color:var(--gold)}\n/* MODAL VIEWER */\n#pj-modal{display:none;position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.75);align-items:center;justify-content:center}\n#pj-modal.open{display:flex}\n#pj-modal-inner{background:#fff;border-radius:12px;padding:20px;max-width:90vw;max-height:90vh;overflow:auto;position:relative}\n#pj-modal-close{position:absolute;top:12px;right:12px;background:var(--red);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}\n#pj-modal img{max-width:80vw;max-height:75vh;border-radius:8px}\n#pj-modal iframe{width:80vw;height:75vh;border:none;border-radius:8px}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- LOCK -->\n<div id=\"lock-screen\">\n  <div class=\"lock-card\">\n    <div style=\"font-size:42px;margin-bottom:14px\">🔐<\u002Fdiv>\n    <h2>Accès sécurisé<\u002Fh2>\n    <p>Tableau de Gestion Immobilière<br>Entrez le mot de passe pour continuer.<\u002Fp>\n    <div style=\"position:relative;margin-bottom:16px\">\n      <input class=\"lock-input\" type=\"password\" id=\"pwd-input\" placeholder=\"••••••••\" style=\"margin-bottom:0;padding-right:44px\">\n      <button onclick=\"var i=document.getElementById('pwd-input');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁️':'🙈'\" style=\"position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:0\">👁️<\u002Fbutton>\n    <\u002Fdiv>\n    <button class=\"lock-btn\" id=\"lock-btn-main\">Déverrouiller<\u002Fbutton>\n    <div class=\"lock-err\" id=\"lock-err\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// AUTH — exécuté immédiatement, pas besoin de window.load\n(function() {\n  var PWD = atob('RVZBMjAxMGV2YQ==');       // EVA2010eva\n  var COMPTA = atob('QXNmOTMxNjAq');         // Asf93160*\n  var attempts = 0;\n\n  function doUnlock() {\n    sessionStorage.setItem('auth','1');\n    document.getElementById('lock-screen').style.display = 'none';\n    document.getElementById('app').style.display = 'block';\n  }\n\n  window.checkPwd = function() {\n    var inp = document.getElementById('pwd-input');\n    var err = document.getElementById('lock-err');\n    var val = inp.value;\n    if (val === PWD) {\n      inp.value = '';\n      doUnlock();\n    } else {\n      inp.value = '';\n      attempts++;\n      inp.classList.remove('shake');\n      inp.offsetWidth; // reflow\n      inp.classList.add('shake');\n      err.textContent = attempts >= 5 ? 'Trop de tentatives. Attendez 30s.' : 'Mot de passe incorrect (' + attempts + '/5)';\n    }\n  };\n\n  window.togglePwd = function(inputId, btnId) {\n    var i = document.getElementById(inputId);\n    var b = document.getElementById(btnId);\n    if (!i) return;\n    i.type = i.type === 'password' ? 'text' : 'password';\n    if (b) b.textContent = i.type === 'password' ? '👁️' : '🙈';\n  };\n\n  function syncAuthLocks() {\n    var unlocked = sessionStorage.getItem('compta_auth') === '1';\n    var lock = document.getElementById('compta-lock');\n    var content = document.getElementById('compta-content');\n    if (lock) lock.style.display = unlocked ? 'none' : 'flex';\n    if (content) content.style.display = unlocked ? 'block' : 'none';\n    if (typeof window.applyReadonlyZones === 'function') window.applyReadonlyZones();\n  }\n  window.syncAuthLocks = syncAuthLocks;\n\n  window.checkComptaPwd = function(inputId, errId) {\n    inputId = inputId || 'compta-pwd-input';\n    errId = errId || 'compta-pwd-err';\n    var inp = document.getElementById(inputId);\n    var err = document.getElementById(errId);\n    if (inp.value === COMPTA) {\n      inp.value = '';\n      sessionStorage.setItem('compta_auth','1');\n      syncAuthLocks();\n    } else {\n      inp.value = '';\n      inp.classList.remove('shake');\n      inp.offsetWidth;\n      inp.classList.add('shake');\n      if (err) { err.textContent = 'Mot de passe incorrect.'; setTimeout(function(){ err.textContent=''; }, 3000); }\n    }\n  };\n\n  // Entrée clavier\n  document.getElementById('pwd-input').addEventListener('keydown', function(e){\n    if (e.key === 'Enter') window.checkPwd();\n  });\n\n  // Bouton déverrouiller\n  document.getElementById('lock-btn-main').addEventListener('click', function(){\n    window.checkPwd();\n  });\n\n  // Session déjà active\n  if (sessionStorage.getItem('auth') === '1') doUnlock();\n  if (localStorage.getItem('wg_dismissed') === '1') {\n    var wg = document.getElementById('welcome-guide');\n    if (wg) wg.style.display = 'none';\n  }\n  syncAuthLocks();\n\n  // showTab doit être global et disponible dès le HTML\n  window.showTab = function(id, btn) {\n    document.querySelectorAll('.tab-panel') p')\">\n            <button class=\"tbtn\" onclick=\"unlockZone('f-emp')\">OK<\u002Fbutton>\n          <\u002Fspan>\n        <\u002Fspan>\n        <span class=\"sec-total red\" id=\"f-emp-tot\">0,00 €<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:8px 16px 0;font-size:11px;color:var(--muted)\">💡 Ces informations sont renseignées par votre comptable. Vous pouvez les consulter à tout moment ; seul votre comptable peut les modifier.<\u002Fdiv>\n    <div style=\"padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;border-bottom:1px solid var(--border)\">\n      <div class=\"ef\"><label>Banque prêteuse<\u002Flabel><input type=\"text\" id=\"f-emp-banque\" placeholder=\"Ex : BNP Paribas\" oninput=\"recalc()\"><\u002Fdiv>\n      <div class=\"ef\"><label>Capital emprunté (€)<\u002Flabel><input type=\"number\" id=\"f-emp-capital\" placeholder=\"0\" oninput=\"recalc()\"><\u002Fdiv>\n      <div class=\"ef\"><label>Taux annuel (%)<\u002Flabel><input type=\"number\" id=\"f-emp-taux\" placeholder=\"0,00\" step=\"0.01\" oninput=\"calcAmortF()\"><\u002Fdiv>\n      <div class=\"ef\"><label>Durée totale (mois)<\u002Flabel><input type=\"number\" id=\"f-emp-duree\" placeholder=\"0\" oninput=\"calcAmortF()\"><\u002Fdiv>\n      <div class=\"ef\"><label>Mensualité hors assurance (€)<\u002Flabel><input type=\"number\" id=\"f-emp-mens\" placeholder=\"0,00\" step=\"0.01\" oninput=\"recalc()\"><\u002Fdiv>\n      <div class=\"ef\"><label>Assurance mensuelle (€)<\u002Flabel><input type=\"number\" id=\"f-emp-ass\" placeholder=\"0,00\" step=\"0.01\" oninput=\"recalc()\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sec-head\" style=\"border-top:none;border-bottom:1px solid var(--border)\">\n      <h3 style=\"font-size:11px\">📋 Échéances mensuelles (capital · intérêts · assurance)<\u002Fh3>\n    <\u002Fdiv>\n    <table class=\"dt\"><thead>\n      <tr class=\"grp-row\">\n        <th class=\"thgrp-blue\">📅 Période<\u002Fth>\n        <th colspan=\"4\" class=\"thgrp-gold\">💰 Répartition mensualité<\u002Fth>\n        <th colspan=\"2\" class=\"thgrp-green\">📎 Justificatif<\u002Fth>\n      <\u002Ftr>\n      <tr><th>Mois<\u002Fth><th style=\"text-align:right\">Capital (€)<\u002Fth><th style=\"text-align:right\">Intérêts (€)<\u002Fth><th style=\"text-align:right\">Assurance (€)<\u002Fth><th style=\"text-align:right\">Total (€)<\u002Fth><th>Pièces jointes<\u002Fth><th><\u002Fth><\u002Ftr>\n    <\u002Fthead><tbody id=\"f-ech-tb\"><\u002Ftbody><\u002Ftable>\n    <button class=\"btn-add\" onclick=\"addEchRow('f-ech-tb')\">＋ Ajouter une échéance manuellement<\u002Fbutton>\n    <div style=\"padding:0 16px 12px\">\n      <button onclick=\"toggleAmort('f')\" style=\"background:none;border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-family:Figtree,sans-serif;font-size:12px;cursor:pointer;color:var(--muted);margin-top:8px\">\n        📊 Afficher / Masquer le tableau d'amortissement calculé\n      <\u002Fbutton>\n      <div id=\"f-amort-wrap\" style=\"display:none;margin-top:12px;overflow-x:auto\">\n        <div style=\"font-size:11px;color:var(--muted);margin-bottom:8px\">Calculé à partir des paramètres saisis ci-dessus · Vue annuelle par défaut<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-bottom:10px\">\n          <button onclick=\"setAmortView('f','annuel')\" id=\"f-btn-an\" style=\"padding:4px 12px;border-radius:6px;border:1px solid var(--blue);background:var(--blue);color:#fff;font-size:11px;cursor:pointer;font-family:Figtree,sans-serif\">Annuel<\u002Fbutton>\n          <button onclick=\"setAmortView('f','mensuel')\" id=\"f-btn-men\" style=\"padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:Figtree,sans-serif\">Mensuel<\u002Fbutton>\n        <\u002Fdiv>\n        <table class=\"dt\" id=\"f-amort-table\"><thead><tr><th>Période<\u002Fth><th style=\"text-align:right\">Capital remboursé (€)<\u002Fth><th style=\"text-align:right\">Intérêts (€)<\u002Fth><th style=\"text-align:right\">Assurance (€)<\u002Fth><th style=\"text-align:right\">Mensualité totale (€)<\u002Fth><th style=\"text-align:right\">Capital restant dû (€)<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"f-amort-tbody\"><\u002Ftbody><\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ GENERALES ═══ -->\n<div class=\"tab-panel\" id=\"tab-generales\">\n  <div class=\"banner neutral\" id=\"g-banner\"><span>📋<\u002Fspan><span id=\"g-text\">Aucune charge générale saisie.<\u002Fspan><\u002Fdiv>\n  <div class=\"kpi-grid\">\n    <div class=\"kpi red\"><div class=\"kpi-accent\"><\u002Fdiv><div class=\"kpi-label\">Total Charges<\u002Fdiv><div class=\"kpi-val\" id=\"g-dep\">0 €<\u002Fdiv><\u002Fdiv>\n    <div class=\"kpi gold\"><div class=\"kpi-accent\"><\u002Fdiv><div class=\"kpi-label\">Nb. lignes<\u002Fdiv><div class=\"kpi-val\" id=\"g-nb\">0<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"sec-head\" style=\"background:rgba(232,41,74,.04)\"><h3>📤 Charges Générales <span class=\"badge badge-red\">SORTIE<\u002Fspan><\u002Fh3><div style=\"display:flex;align-items:center;gap:8px\"><button class=\"ocr-btn\" onclick=\"openOCR('depense','g-dep-tb')\">🔍 OCR Facture<\u002Fbutton><span class=\"sec-total red\" id=\"g-dep-tot\">0,00 €<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div style=\"padding:8px 16px 0;font-size:11px;color:var(--muted)\">💡 Charges communes aux deux biens (ex : frais bancaires, honoraires comptables). Ajoutez-les ici ou scannez vos factures.<\u002Fdiv>\n    <table class=\"dt\"><thead><tr><th>Date<\u002Fth><th>Fournisseur<\u002Fth><th>Catégorie<\u002Fth><th>Commentaire<\u002Fth><th style=\"text-align:right\">Montant (€)<\u002Fth><th>Pièces jointes<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"g-dep-tb\"><\u002Ftbody><\u002Ftable>\n    <div class=\"batch-zone\" ondragover=\"event.preventDefault();this.classList.add('drag-over')\" ondragleave=\"this.classList.remove('drag-over')\" ondrop=\"event.preventDefault();this.classList.remove('drag-over');batchProcess(event.dataTransfer.files,'depense','g-dep-tb','batch-gdep')\" onclick=\"document.getElementById('batch-gdep-input').click()\">\n      <input type=\"file\" id=\"batch-gdep-input\" accept=\"image/*,.pdf\" multiple=\"\" style=\"display:none\" onchange=\"batchProcess(this.files,'depense','g-dep-tb','batch-gdep')\">\n      <div class=\"batch-zone-icon\">📂<\u002Fdiv>\n      <div class=\"batch-zone-text\"><div class=\"batch-zone-title\">Déposer plusieurs factures d'achat<\u002Fdiv><div class=\"batch-zone-sub\">Glissez plusieurs fichiers ou cliquez · OCR automatique sur chacun<\u002Fdiv><\u002Fdiv>\n      <div class=\"batch-zone-btn\">Sélectionner<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"batch-queue\" id=\"batch-gdep-queue\"><div class=\"batch-queue-title\">File de traitement<\u002Fdiv><div id=\"batch-gdep-items\"><\u002Fdiv><\u002Fdiv>\n    <button class=\"btn-add\" onclick=\"addDepRow('g-dep-tb')\">＋ Ajouter manuellement<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"section\"><div class=\"sec-head\"><h3>Répartition par catégorie<\u002Fh3><\u002Fdiv><div style=\"padding:18px 20px\" id=\"g-cats\"><div class=\"empty\"><div class=\"empty-icon\">📂<\u002Fdiv><p>Aucune dépense.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ═══ COMPTABILITE ═══ -->\n<div class=\"tab-panel\" id=\"tab-compta\">\n  <!-- Verrou comptabilité -->\n  <div id=\"compta-lock\" style=\"display:flex;align-items:center;justify-content:center;min-height:400px\">\n    <div class=\"lock-card\" style=\"width:340px;padding:36px 32px 28px\">\n      <div style=\"font-size:36px;margin-bottom:12px\">🔒<\u002Fdiv>\n      <h2 style=\"font-size:18px\">Accès comptable restreint<\u002Fh2>\n      <p style=\"margin-top:6px;margin-bottom:22px\">Ce module est réservé au comptable.<br>Entrez le mot de passe professionnel.<\u002Fp>\n      <div style=\"position:relative;margin-bottom:16px\">\n        <input class=\"lock-input\" type=\"password\" id=\"compta-pwd-input\" placeholder=\"••••••••\" style=\"margin-bottom:0;padding-right:44px\" onkeydown=\"if(event.key==='Enter')checkComptaPwd()\">\n        <button id=\"eye-compta\" onclick=\"togglePwd('compta-pwd-input','eye-compta')\" style=\"position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;padding:0;line-height:1\">👁️<\u002Fbutton>\n      <\u002Fdiv>\n      <button class=\"lock-btn\" onclick=\"checkComptaPwd()\">Accéder au module<\u002Fbutton>\n      <div class=\"lock-err\" id=\"compta-pwd-err\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <!-- Contenu comptabilité (caché par défaut) -->\n  <div id=\"compta-content\" style=\"display:none\">\n  <div class=\"mode-bar\"><span class=\"mode-badge mb-compta\">📒 Module Comptable<\u002Fspan><span style=\"color:var(--muted);font-size:12px\">BIC réel LMNP/LMP · Export FEC Fulll · PCG<\u002Fspan><\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"sec-head\"><h3>📂 Plan comptable <span class=\"badge badge-blue\">IMPORT PDF<\u002Fspan><\u002Fh3>\n      <button class=\"tbtn\" onclick=\"document.getElementById('pc-in').click()\">📤 Importer plan comptable<\u002Fbutton>\n    <\u002Fdiv>\n    <input type=\"file\" id=\"pc-in\" accept=\".pdf\" style=\"display:none\" onchange=\"importPC(this.files[0])\">\n    <div id=\"pc-status\" style=\"display:none;padding:10px 18px;font-size:13px;font-weight:500\"><\u002Fdiv>\n    <div class=\"comptes-grid\" id=\"pc-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"sec-head\"><h3>📋 Journal des écritures<\u002Fh3>\n      <button class=\"tbtn\" style=\"background:var(--blue);color:#fff;border-color:var(--blue)\" onclick=\"genEcritures()\">⚙️ Générer les écritures<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"ec-status\" style=\"padding:12px 18px;font-size:13px;color:var(--muted)\">Cliquez sur « Générer » pour créer le journal.<\u002Fdiv>\n    <div style=\"overflow-x:auto\">\n      <table class=\"dt\" id=\"ec-table\" style=\"display:none;min-width:900px\">\n        <thead>\n          <tr class=\"grp-row\">\n            <th colspan=\"3\" class=\"thgrp-blue\">🧾 Pièce &amp; journal<\u002Fth>\n            <th colspan=\"3\" class=\"thgrp-gold\">📂 Compte &amp; libellé<\u002Fth>\n            <th colspan=\"2\" class=\"thgrp-green\">💶 Montants<\u002Fth>\n          <\u002Ftr>\n          <tr><th>N° Pièce<\u002Fth><th>Date<\u002Fth><th>Journal<\u002Fth><th>N° Compte<\u002Fth><th>Libellé compte<\u002Fth><th>Libellé écriture<\u002Fth><th style=\"text-align:right\">Débit (€)<\u002Fth><th style=\"text-align:right\">Crédit (€)<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"ec-tbody\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"sec-head\"><h3>🗂️ Balance N-1 <span class=\"badge badge-blue\">IMPORT PDF<\u002Fspan><\u002Fh3>\n      <button class=\"tbtn\" onclick=\"document.getElementById('n1-in').click()\">📤 Importer la balance N-1 (PDF)<\u002Fbutton>\n    <\u002Fdiv>\n    <input type=\"file\" id=\"n1-in\" accept=\".pdf\" style=\"display:none\" onchange=\"importN1(this.files[0])\">\n    <div id=\"n1-status\" style=\"display:none;padding:10px 18px;font-size:13px;font-weight:500\"><\u002Fdiv>\n    <div style=\"padding:10px 18px 0;font-size:12px;color:var(--muted)\">Importez le PDF de votre balance N-1, ou complétez/corrigez manuellement les comptes ci-dessous.<\u002Fdiv>\n    <table class=\"dt\"><thead><tr><th>N° Compte<\u002Fth><th>Libellé<\u002Fth><th style=\"text-align:right\">Solde N-1 (€)<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"n1-tb\"><\u002Ftbody><\u002Ftable>\n    <button class=\"btn-add\" onclick=\"addN1Row()\">＋ Ajouter un compte N-1<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"sec-head\"><h3>📈 Balance générale &amp; Résultat comptable<\u002Fh3>\n      <button class=\"tbtn\" onclick=\"renderBalance()\">🔄 Actualiser<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"balance-summary\" style=\"padding:14px 18px\"><div class=\"empty\"><div class=\"empty-icon\">📊<\u002Fdiv><p>Générez d'abord les écritures pour calculer la balance.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <div style=\"overflow-x:auto\">\n      <table class=\"dt\" id=\"balance-table\" style=\"display:none;min-width:800px\">\n        <thead>\n          <tr class=\"grp-row\">\n            <th colspan=\"2\" class=\"thgrp-blue\">📂 Compte<\u002Fth>\n            <th colspan=\"3\" class=\"thgrp-gold\">📅 Exercice N<\u002Fth>\n            <th colspan=\"2\" class=\"thgrp-green\">🔁 Comparatif N-1<\u002Fth>\n          <\u002Ftr>\n          <tr><th>Compte<\u002Fth><th>Libellé<\u002Fth><th style=\"text-align:right\">Débit N<\u002Fth><th style=\"text-align:right\">Crédit N<\u002Fth><th style=\"text-align:right\">Solde N<\u002Fth><th style=\"text-align:right\">Solde N-1<\u002Fth><th style=\"text-align:right\">Variation<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"balance-tbody\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"section\">\n    <div class=\"sec-head\"><h3>📤 Exports<\u002Fh3><\u002Fdiv>\n    <div class=\"export-btns\">\n      <button class=\"ebtn\" onclick=\"exportFEC()\"><span style=\"font-size:22px\">📄<\u002Fspan><div><div class=\"ebtn-title\">Export FEC<\u002Fdiv><div class=\"ebtn-sub\">Format Fulll · séparateur | · UTF-8 · + pièces jointes (ZIP)<\u002Fdiv><\u002Fdiv><\u002Fbutton>\n      <button class=\"ebtn\" onclick=\"exportCSV()\"><span style=\"font-size:22px\">📊<\u002Fspan><div><div class=\"ebtn-title\">Export Excel<\u002Fdiv><div class=\"ebtn-sub\">CSV structuré · prêt à vérifier · + pièces jointes (ZIP)<\u002Fdiv><\u002Fdiv><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv><!-- /compta-content -->\n<\u002Fdiv><!-- /tab-compta -->\n\n<\u002Fdiv><!-- /main -->\n<\u002Fdiv><!-- /app -->\n\n<!-- MODAL OCR -->\n<div id=\"ocr-modal\">\n  <div id=\"ocr-inner\">\n    <h3>🔍 Reconnaissance de document<\u002Fh3>\n    <p id=\"ocr-modal-desc\">Importez une photo ou un PDF — Claude extrait automatiquement les données.<\u002Fp>\n    <div id=\"ocr-upload-zone\" style=\"border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;background:var(--surface2);margin-bottom:16px;transition:all .2s\" onclick=\"document.getElementById('ocr-file-input').click()\" ondragover=\"event.preventDefault();this.style.borderColor='var(--blue)'\" ondragleave=\"this.style.borderColor='var(--border)'\" ondrop=\"event.preventDefault();this.style.borderColor='var(--border)';handleOCRFile(event.dataTransfer.files[0])\">\n      <input type=\"file\" id=\"ocr-file-input\" accept=\"image/*,.pdf\" style=\"display:none\" onchange=\"handleOCRFile(this.files[0])\">\n      <div style=\"font-size:32px;margin-bottom:8px\">📷<\u002Fdiv>\n      <div style=\"font-weight:600;font-size:14px;margin-bottom:4px\">Glissez-déposez ou cliquez<\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--muted)\">Photo, scan, JPG, PNG, PDF<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ocr-preview\" id=\"ocr-preview\" style=\"display:none\"><\u002Fdiv>\n    <div id=\"ocr-status\" style=\"display:none;text-align:center;padding:16px;color:var(--blue);font-size:13px;font-weight:500\"><\u002Fdiv>\n    <div id=\"ocr-fields-wrap\" style=\"display:none\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n        <span style=\"font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)\">Données extraites — vérifiez avant de valider<\u002Fspan>\n        <span class=\"ocr-confidence\" id=\"ocr-conf\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ocr-fields\" id=\"ocr-fields\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ocr-actions\">\n      <button class=\"ocr-cancel\" onclick=\"closeOCR()\">Annuler<\u002Fbutton>\n      <button class=\"ocr-confirm\" id=\"ocr-confirm-btn\" style=\"display:none\" onclick=\"confirmOCR()\">✅ Ajouter la ligne<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- MODAL PIÈCE JOINTE -->\n<div id=\"pj-modal\">\n  <div id=\"pj-modal-inner\">\n    <button id=\"pj-modal-close\" onclick=\"closePJ()\">✕<\u002Fbutton>\n    <div id=\"pj-modal-body\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"toast\">✅ Données sauvegardées<\u002Fdiv>\n\n<script>\n// ══ NAV — showTab défini dans le script inline au-dessus ══\n\n// ══ CONFIG ══\ndocument.addEventListener('DOMContentLoaded', function() {\ndocument.getElementById('yr').textContent = new Date().getFullYear();\npdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';\n\nconst CATS = [\n  '6061 - Fournitures non stockables (eau, énergie)',\n  '6063 - Fournitures entretien et petit équipement',\n  '6064 - Fournitures administratives',\n  '6068 - Autres matières et fournitures',\n  '6111 - Sous-traitance générale',\n  '6132 - Charges de copropriété',\n  '6135 - Locations mobilières',\n  '6155 - Entretien et réparations immobiliers',\n  '6156 - Entretien et réparations mobiliers',\n  '6160 - Primes d assurance',\n  '6226 - Commissions et courtages (Airbnb, agences)',\n  '6228 - Honoraires comptables et juridiques',\n  '6261 - Téléphonie et internet',\n  '6270 - Frais bancaires',\n  '6350 - Taxe foncière',\n  '6351 - CFE',\n  '6354 - Taxe ordures ménagères',\n  '6615 - Intérêts des emprunts',\n  '6616 - Intérêts bancaires',\n  '6811 - Dotations amortissements corporels',\n  '2181 - Agencements et aménagements',\n  '2184 - Mobilier',\n  '2183 - Matériel bureau et informatique',\n  '6288 - Autres charges diverses',\n];\nconst CAT_COLORS = {\n  '6061 - Fournitures non stockables (eau, énergie)':'#00bcd4',\n  '6063 - Fournitures entretien et petit équipement':'#00d68f',\n  '6064 - Fournitures administratives':'#26c6da',\n  '6068 - Autres matières et fournitures':'#80deea',\n  '6111 - Sous-traitance générale':'#e91e63',\n  '6132 - Charges de copropriété':'#4caf50',\n  '6135 - Locations mobilières':'#8bc34a',\n  '6155 - Entretien et réparations immobiliers':'#f44336',\n  '6156 - Entretien et réparations mobiliers':'#ef9a9a',\n  '6160 - Primes d assurance':'#9c27b0',\n  '6226 - Commissions et courtages (Airbnb, agences)':'#ff9800',\n  '6228 - Honoraires comptables et juridiques':'#3f51b5',\n  '6261 - Téléphonie et internet':'#009688',\n  '6270 - Frais bancaires':'#607d8b',\n  '6350 - Taxe foncière':'#795548',\n  '6351 - CFE':'#ff5722',\n  '6354 - Taxe ordures ménagères':'#a1887f',\n  '6615 - Intérêts des emprunts':'#ff9800',\n  '6616 - Intérêts bancaires':'#ffc107',\n  '6811 - Dotations amortissements corporels':'#78909c',\n  '2181 - Agencements et aménagements':'#6c63ff',\n  '2184 - Mobilier':'#00acc1',\n  '2183 - Matériel bureau et informatique':'#5c6bc0',\n  '6288 - Autres charges diverses':'#90a4ae',\n};\n\n// ══ ROW HELPERS ══\nfunction catOpts(sel='') { return CATS.map(c=>`<option value=\"${c}\"${sel===c?' selected':''}>${c}<\u002Foption>`).join(''); }\nfunction delBtn(){ return `<button class=\"btn-del\" onclick=\"this.closest('tr').remove();recalc()\">✕<\u002Fbutton>`; }\n\nfunction addDepRow(id, date='', fourn='', cat='', comment='', amt='', pj=[]) {\n  const tb = document.getElementById(id);\n  const tr = document.createElement('tr');\n  tr.dataset.pj = JSON.stringify(pj);\n  tr.innerHTML = `\n    <td><input type=\"date\" value=\"${date}\" style=\"width:120px\" onchange=\"recalc()\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Fournisseur\" value=\"${fourn}\" oninput=\"recalc()\"><\u002Ftd>\n    <td><select onchange=\"recalc()\"><option value=\"\">— Catégorie —<\u002Foption>${catOpts(cat)}<\u002Fselect><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Commentaire\" value=\"${comment}\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${amt}\" style=\"text-align:right;width:90px;color:var(--red)\" onchange=\"recalc()\"><\u002Ftd>\n    <td><div class=\"pj-cell\" id=\"pjcell_${Math.random().toString(36).slice(2)}\">${renderPJThumbs(pj)}<label class=\"pj-btn\">📎 <input type=\"file\" accept=\"image/*,.pdf\" multiple style=\"display:none\" onchange=\"addPJFiles(this)\"> Joindre<\u002Flabel><\u002Fdiv><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n  // Restore PJ data\n  if (pj.length) {\n    const cell = tr.querySelector('.pj-cell');\n    pj.forEach(f => addPJThumb(cell, f, tr));\n  }\n}\n\n// ══ IMMOBILISATIONS & AMORTISSEMENTS (section protégée) ══\n// ══ COULEUR PAR FAMILLE DE COMPTE (cohérence visuelle sur tout le site) ══\nfunction compteFamily(num) {\n  if (!num) return 'autre';\n  const d = String(num).charAt(0);\n  if (d === '6') return 'charge';\n  if (d === '7') return 'produit';\n  if (d === '2') return 'immo';\n  if (d === '1') return 'capital';\n  return 'autre';\n}\nfunction compteTagHtml(num) {\n  return `<span class=\"compte-tag ${compteFamily(num)}\">${num}<\u002Fspan>`;\n}\nfunction styleCatSelects() {\n  ['v-dep-tb','f-dep-tb','g-dep-tb'].forEach(tid=>{\n    document.querySelectorAll(`#${tid} tr`).forEach(tr=>{\n      const sel = tr.querySelector('select');\n      if (!sel || !sel.value) return;\n      const pk = catToPC(sel.value);\n      const num = PC[pk]?.n || '';\n      const fam = compteFamily(num);\n      const palette = {\n        charge:['rgba(232,41,74,.09)','var(--red)'],\n        produit:['rgba(0,169,110,.09)','var(--green)'],\n        immo:['rgba(80,70,228,.09)','var(--blue)'],\n        capital:['rgba(121,85,72,.09)','#795548'],\n        autre:['var(--surface2)','var(--muted)'],\n      };\n      const [bg,fg] = palette[fam] || palette.autre;\n      sel.style.background = bg; sel.style.color = fg; sel.style.fontWeight = '600';\n    });\n  });\n}\n\nconst IMMO_COMPTES = [\n  '211 - Terrains',\n  '213 - Constructions',\n  '2181 - Agencements et aménagements',\n  '2183 - Matériel bureau et informatique',\n  '2184 - Mobilier',\n];\nfunction immoOpts(sel=''){ return IMMO_COMPTES.map(c=>`<option value=\"${c}\"${sel===c?' selected':''}>${c}<\u002Foption>`).join(''); }\n\nfunction addImmoRow(bien, designation='', compte='2184 - Mobilier', dateAcq='', vo='', duree='10', sortie='non', commentaire='', pj=[]) {\n  const tb = document.getElementById(`${bien}-immo-tb`);\n  if (!tb) return;\n  const tr = document.createElement('tr');\n  tr.dataset.pj = JSON.stringify(pj);\n  tr.innerHTML = `\n    <td><input type=\"text\" placeholder=\"Ex : Réfrigérateur\" value=\"${designation}\" oninput=\"recalc()\"><\u002Ftd>\n    <td><select onchange=\"recalc()\">${immoOpts(compte)}<\u002Fselect><\u002Ftd>\n    <td><input type=\"date\" data-f=\"date\" value=\"${dateAcq}\" style=\"width:135px\" oninput=\"recalc()\"><\u002Ftd>\n    <td><input type=\"number\" data-f=\"vo\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${vo}\" style=\"text-align:right;width:100px\" oninput=\"recalc()\"><\u002Ftd>\n    <td><input type=\"number\" data-f=\"duree\" min=\"1\" step=\"1\" placeholder=\"10\" value=\"${duree}\" style=\"text-align:right;width:70px\" oninput=\"recalc()\"><\u002Ftd>\n    <td class=\"mono\" data-f=\"dotcell\">—<\u002Ftd>\n    <td class=\"mono\" data-f=\"cumcell\">—<\u002Ftd>\n    <td class=\"mono\" data-f=\"vnccell\" style=\"font-weight:700\">—<\u002Ftd>\n    <td><div class=\"pj-cell\">${renderPJThumbs(pj)}<label class=\"pj-btn\">📎 <input type=\"file\" accept=\"image/*,.pdf\" multiple style=\"display:none\" onchange=\"addPJFiles(this)\"> Joindre<\u002Flabel><\u002Fdiv><\u002Ftd>\n    <td><select class=\"client-note\" style=\"width:80px\" onchange=\"recalc()\"><option value=\"non\"${sortie==='non'?' selected':''}>Non<\u002Foption><option value=\"oui\"${sortie==='oui'?' selected':''}>Oui<\u002Foption><\u002Fselect><\u002Ftd>\n    <td><input type=\"text\" class=\"client-note\" placeholder=\"Commentaire (ex : date/raison de sortie)\" value=\"${commentaire}\" style=\"min-width:160px\"><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n  if (pj.length) {\n    const cell = tr.querySelector('.pj-cell');\n    pj.forEach(f => addPJThumb(cell, f, tr));\n  }\n  recalc();\n}\n\n// Amortissement linéaire, prorata temporis depuis la date d'acquisition jusqu'à aujourd'hui\nfunction calcImmoAmort(bien) {\n  const tb = document.getElementById(`${bien}-immo-tb`);\n  const totEl = document.getElementById(`${bien}-immo-tot`);\n  if (!tb) return {totalVO:0,totalCum:0,totalVNC:0,totalDot:0};\n  let totalVO=0, totalCum=0, totalVNC=0, totalDot=0;\n  const now = new Date();\n  tb.querySelectorAll('tr').forEach(tr=>{\n    const selects = tr.querySelectorAll('select');\n    const compteSelEl = selects[0], sortieSelEl = selects[1];\n    const compteSel = compteSelEl?.value || '';\n    const isTerrain = /^211\\s/.test(compteSel);\n    const vo = parseFloat(tr.querySelector('[data-f=\"vo\"]')?.value) || 0;\n    const duree = parseFloat(tr.querySelector('[data-f=\"duree\"]')?.value) || 0;\n    const dateAcq = tr.querySelector('[data-f=\"date\"]')?.value;\n    const dotAnnuelle = (!isTerrain && duree > 0) ? vo/duree : 0;\n    let years = 0;\n    if (dateAcq) { const d = new Date(dateAcq); years = Math.max(0, (now-d)/(365.25*24*3600*1000)); }\n    const cumul = isTerrain ? 0 : Math.max(0, Math.min(vo, dotAnnuelle*years));\n    const vnc = Math.max(0, vo-cumul);\n    totalVO += vo; totalCum += cumul; totalVNC += vnc; totalDot += dotAnnuelle;\n    const dc=tr.querySelector('[data-f=\"dotcell\"]'), cc=tr.querySelector('[data-f=\"cumcell\"]'), vc=tr.querySelector('[data-f=\"vnccell\"]');\n    if(dc) dc.textContent = isTerrain ? 'Non amortissable' : fmt(dotAnnuelle);\n    if(cc) cc.textContent = isTerrain ? '—' : fmt(cumul);\n    if(vc){ vc.textContent = fmt(vnc); vc.className = 'mono vnc-val ' + (vnc > 0 ? 'pos' : 'zero'); }\n\n    // Colore le compte selon sa famille (terrain / construction / mobilier)\n    if (compteSelEl) {\n      if (/^211\\s/.test(compteSel)) { compteSelEl.style.background='rgba(121,85,72,.10)'; compteSelEl.style.color='#795548'; compteSelEl.style.fontWeight='600'; }\n      else if (/^213\\s/.test(compteSel)) { compteSelEl.style.background='rgba(80,70,228,.10)'; compteSelEl.style.color='var(--blue)'; compteSelEl.style.fontWeight='600'; }\n      else { compteSelEl.style.background='rgba(217,119,6,.10)'; compteSelEl.style.color='var(--gold)'; compteSelEl.style.fontWeight='600'; }\n    }\n    // Colore le statut Sortie (vert = toujours en possession, rouge = sorti)\n    if (sortieSelEl) {\n      if (sortieSelEl.value === 'oui') { sortieSelEl.style.background='rgba(232,41,74,.12)'; sortieSelEl.style.color='var(--red)'; sortieSelEl.style.fontWeight='700'; sortieSelEl.style.borderColor='rgba(232,41,74,.3)'; }\n      else { sortieSelEl.style.background='rgba(0,169,110,.10)'; sortieSelEl.style.color='var(--green)'; sortieSelEl.style.fontWeight='600'; sortieSelEl.style.borderColor='rgba(0,169,110,.25)'; }\n    }\n  });\n  if (totEl) totEl.textContent = totalVO ? `VO ${fmt(totalVO)} · Dotation/an ${fmt(totalDot)} · VNC ${fmt(totalVNC)}` : '';\n  return {totalVO,totalCum,totalVNC,totalDot};\n}\n\nfunction addLoyRow(mois='',loc='',appt='',com='',amt='',pj=[]) {\n  const tb = document.getElementById('v-loy');\n  const tr = document.createElement('tr');\n  tr.dataset.pj = JSON.stringify(pj);\n  tr.innerHTML = `\n    <td><input type=\"month\" value=\"${mois}\" style=\"width:120px\" onchange=\"recalc()\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Locataire\" value=\"${loc}\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Appart\" value=\"${appt}\" style=\"width:70px\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Commentaire\" value=\"${com}\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${amt}\" style=\"text-align:right;width:90px;color:var(--green)\" onchange=\"recalc()\"><\u002Ftd>\n    <td><div class=\"pj-cell\"><label class=\"pj-btn\">📎 <input type=\"file\" accept=\"image/*,.pdf\" multiple style=\"display:none\" onchange=\"addPJFiles(this)\"> Joindre<\u002Flabel><\u002Fdiv><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n}\n\nfunction addPrvRow(mois='',loc='',appt='',com='',amt='',pj=[]) {\n  const tb = document.getElementById('v-prv');\n  const tr = document.createElement('tr');\n  tr.dataset.pj = JSON.stringify(pj);\n  tr.innerHTML = `\n    <td><input type=\"month\" value=\"${mois}\" style=\"width:120px\" onchange=\"recalc()\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Locataire\" value=\"${loc}\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Appart\" value=\"${appt}\" style=\"width:70px\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Commentaire\" value=\"${com}\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${amt}\" style=\"text-align:right;width:90px;color:var(--green)\" onchange=\"recalc()\"><\u002Ftd>\n    <td><div class=\"pj-cell\"><label class=\"pj-btn\">📎 <input type=\"file\" accept=\"image/*,.pdf\" multiple style=\"display:none\" onchange=\"addPJFiles(this)\"> Joindre<\u002Flabel><\u002Fdiv><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n}\n\nfunction addLocRow(appt='',nom='',de='',df='',dg='') {\n  const tb = document.getElementById('v-loc');\n  const tr = document.createElement('tr');\n  tr.innerHTML = `\n    <td><input type=\"text\" placeholder=\"Appart 1\" value=\"${appt}\" style=\"width:90px\"><\u002Ftd>\n    <td><input type=\"text\" placeholder=\"Nom prénom\" value=\"${nom}\"><\u002Ftd>\n    <td><input type=\"date\" value=\"${de}\" style=\"width:130px\"><\u002Ftd>\n    <td><input type=\"date\" value=\"${df}\" style=\"width:130px\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.01\" placeholder=\"0,00\" value=\"${dg}\" style=\"text-align:right;width:110px;color:var(--muted)\" onchange=\"recalc()\"><\u002Ftd>\n    <td>${delBtn()}<\u002Ftd>`;\n  tb.appendChild(tr);\n}\n\n// ══ TOTALS ══\nfunction sumTb(id) {\n  let t=0;\n  document.querySelectorAll(`#${id} tr`).forEach(tr=>{\n    const nums=tr.querySelectorAll('input[type=\"number\"]');\n    if(nums.length) t+=parseFloat(nums[nums.length-1].value)||0;\n  });\n  return t;\n}\nfunction catTotals(id) {\n  const c={};\n  document.querySelectorAll(`#${id} tr`).forEach(tr=>{\n    const sel=tr.querySelector('select'); const nums=tr.querySelectorAll('input[type=\"number\"]');\n    if(!sel||!nums.length) return;\n    const cat=sel.value||'AUTRE'; const amt=parseFloat(nums[nums.length-1].value)||0;\n    if(amt>0) c[cat]=(c[cat]||0)+amt;\n  });\n  return c;\n}\nfunction fmt(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }\nfunction fmtS(n){ return n.toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0})+' €'; }\n\n// ══ CAT BARS ══\nfunction renderCats(id, cats) {\n  const el=document.getElementById(id);\n  if(!Object.keys(cats).length){el.innerHTML='<div class=\"empty\"><div class=\"empty-icon\">📂<\u002Fdiv><p>Aucune dépense.<\u002Fp><\u002Fdiv>';return;}\n  const tot=Object.values(cats).reduce((a,b)=>a+b,0);\n  el.innerHTML=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`\n    <div class=\"cat-bar\"><div class=\"cb-lbl\">${cat}<\u002Fdiv><div class=\"cb-track\"><div class=\"cb-fill\" style=\"width:${(amt/tot*100).toFixed(1)}%;background:${CAT_COLORS[cat]||'#999'}\"><\u002Fdiv><\u002Fdiv><div class=\"cb-amt\">${fmt(amt)}<\u002Fdiv><\u002Fdiv>`).join('');\n}\n\n// ══ BANNER ══\nfunction setBanner(bid,tid,rec,dep) {\n  const b=document.getElementById(bid), t=document.getElementById(tid);\n  const cf=rec-dep;\n  b.className='banner';\n  if(rec===0&&dep===0){b.classList.add('neutral');t.textContent='Aucune donnée saisie.';}\n  else if(cf>0){b.classList.add('positive');t.textContent=`✅ Situation positive : cash flow de
